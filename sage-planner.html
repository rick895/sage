<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculate your plan — Natural Hounds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --nh-blue: #9fd1ff;
    --nh-blue-soft: #e8f3ff;
    --nh-slate: #536479;
    --nh-slate-soft: #f5f7fa;
    --nh-black: #111111;
    --nh-cream: #fdf9f3;
    --nh-border: #e6e2da;
    --nh-text: #2a2a2a;
    --nh-text-muted: #6b6b6b;
    --nh-success: #2d6a4f;
    --nh-warn-bg: #fff4d6;
    --nh-warn-text: #6b4a00;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: transparent;
    color: var(--nh-text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 36px;
    line-height: 1.15;
    letter-spacing: -0.02em;
    margin: 0 0 12px;
    color: var(--nh-black);
  }
  .lede {
    font-size: 16px;
    color: var(--nh-text-muted);
    margin: 0 0 16px;
    max-width: 520px;
  }
  .sampler-shortcut {
    display: inline-block;
    font-size: 13px;
    color: var(--nh-slate);
    text-decoration: none;
    border-bottom: 1px solid var(--nh-border);
    padding-bottom: 2px;
    margin: 0 0 28px;
    transition: all 0.15s;
  }
  .sampler-shortcut:hover {
    color: var(--nh-black);
    border-color: var(--nh-slate);
  }
  .dog-block {
    background: white;
    border: 1px solid var(--nh-border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .dog-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .dog-title {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    color: var(--nh-black);
  }
  .remove-dog {
    background: none;
    border: none;
    color: var(--nh-text-muted);
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    text-decoration: underline;
    padding: 4px 8px;
  }
  .remove-dog:hover { color: var(--nh-black); }
  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }
  .field-label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--nh-slate);
    margin-bottom: 10px;
    letter-spacing: 0.02em;
  }
  .field-hint {
    font-size: 12px;
    color: var(--nh-text-muted);
    line-height: 1.5;
    margin-top: 10px;
    padding: 10px 12px;
    background: var(--nh-slate-soft);
    border-radius: 8px;
  }
  .field-hint strong {
    color: var(--nh-black);
    font-weight: 600;
  }
  .pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .pill {
    background: white;
    border: 1px solid var(--nh-border);
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 14px;
    cursor: pointer;
    color: var(--nh-text);
    font-family: inherit;
    transition: all 0.15s;
    font-weight: 500;
  }
  .pill:hover { border-color: var(--nh-slate); }
  .pill[aria-pressed="true"] {
    background: var(--nh-blue-soft);
    color: var(--nh-black);
    border-color: var(--nh-blue);
  }
  .weight-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .weight-row input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: var(--nh-border);
    border-radius: 2px;
    outline: none;
  }
  .weight-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px;
    height: 22px;
    background: var(--nh-black);
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid white;
    box-shadow: 0 0 0 1px var(--nh-border);
  }
  .weight-row input[type=range]::-moz-range-thumb {
    width: 22px;
    height: 22px;
    background: var(--nh-black);
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid white;
    box-shadow: 0 0 0 1px var(--nh-border);
  }
  .weight-out {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 500;
    min-width: 80px;
    text-align: right;
    color: var(--nh-black);
  }
  .add-dog-btn {
    width: 100%;
    padding: 14px;
    background: white;
    border: 1px dashed var(--nh-slate);
    border-radius: 12px;
    font-size: 14px;
    color: var(--nh-slate);
    cursor: pointer;
    font-family: inherit;
    margin-bottom: 16px;
    font-weight: 500;
  }
  .add-dog-btn:hover {
    border-style: solid;
    color: var(--nh-black);
    border-color: var(--nh-black);
  }
  .calc-btn {
    width: 100%;
    padding: 18px;
    background: var(--nh-black);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.02em;
    transition: opacity 0.15s;
  }
  .calc-btn:hover { opacity: 0.85; }
  .calc-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .results { margin-top: 32px; }
  .results.hidden { display: none; }
  .combined-card {
    background: var(--nh-blue-soft);
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 16px;
  }
  .combined-label {
    font-size: 12px;
    color: var(--nh-slate);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .combined-value {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 500;
    color: var(--nh-black);
  }
  .dog-result {
    background: white;
    border: 1px solid var(--nh-border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .dog-result-header {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--nh-black);
    margin-bottom: 4px;
  }
  .dog-result-sub {
    font-size: 13px;
    color: var(--nh-text-muted);
    margin-bottom: 20px;
  }
  .summary-strip {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .summary-card {
    background: var(--nh-slate-soft);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .summary-label {
    font-size: 11px;
    color: var(--nh-slate);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
    font-weight: 500;
  }
  .summary-value {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--nh-black);
  }
  .mix-card {
    background: var(--nh-blue-soft);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  .mix-label {
    font-size: 11px;
    color: var(--nh-slate);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .mix-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--nh-black);
    margin-bottom: 8px;
  }
  .mix-detail {
    font-size: 14px;
    color: var(--nh-slate);
    line-height: 1.6;
  }
  .mix-detail strong { color: var(--nh-black); font-weight: 600; }

  /* Premium Plus callout — sits under each dog's mix card */
  .premium-plus {
    background: white;
    border: 1px solid var(--nh-blue);
    border-radius: 12px;
    padding: 14px 18px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .premium-plus-text {
    flex: 1;
    min-width: 200px;
    font-size: 13px;
    line-height: 1.5;
    color: var(--nh-text);
  }
  .premium-plus-text strong {
    color: var(--nh-black);
    font-weight: 600;
  }
  .premium-plus-link {
    font-size: 13px;
    font-weight: 600;
    color: var(--nh-black);
    text-decoration: none;
    white-space: nowrap;
    border-bottom: 1px solid var(--nh-black);
    padding-bottom: 1px;
  }
  .premium-plus-link:hover { opacity: 0.7; }

  .price-tiers {
    background: var(--nh-slate-soft);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .tier-title {
    font-size: 11px;
    color: var(--nh-slate);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
    font-weight: 500;
  }
  .tier-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 14px;
    border-bottom: 1px solid rgba(0,0,0,0.06);
  }
  .tier-row:last-child { border-bottom: none; }
  .tier-row.best { font-weight: 600; }
  .tier-row.best span:last-child { color: var(--nh-success); }
  .recipe-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }
  .recipe-card {
    background: white;
    border: 1px solid var(--nh-border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .recipe-card.in-mix {
    border-color: var(--nh-blue);
    background: var(--nh-blue-soft);
  }
  .recipe-card.dimmed { opacity: 0.45; }
  .recipe-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--nh-black);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .recipe-badge {
    font-size: 9px;
    background: var(--nh-blue);
    color: var(--nh-black);
    padding: 2px 7px;
    border-radius: 999px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .recipe-badge.excluded {
    background: var(--nh-slate-soft);
    color: var(--nh-slate);
  }
  .recipe-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--nh-text-muted);
    padding: 2px 0;
  }
  .recipe-row span:last-child { color: var(--nh-text); font-weight: 500; }
  .note {
    font-size: 13px;
    color: var(--nh-warn-text);
    padding: 14px 18px;
    background: var(--nh-warn-bg);
    border-radius: 12px;
    margin-bottom: 16px;
    line-height: 1.55;
  }
  .note strong { font-weight: 600; }
  .note.disclaimer {
    background: var(--nh-slate-soft);
    color: var(--nh-text-muted);
  }
  .ctas {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .cta {
    flex: 1;
    min-width: 200px;
    padding: 14px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    border: 1px solid var(--nh-border);
    background: white;
    color: var(--nh-black);
    transition: all 0.15s;
    text-align: center;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0.02em;
  }
  .cta.primary {
    background: var(--nh-black);
    color: white;
    border-color: var(--nh-black);
  }
  .cta:hover { border-color: var(--nh-slate); }
  .cta.primary:hover { opacity: 0.85; }
  .cta:disabled { opacity: 0.5; cursor: not-allowed; }
  .reset {
    display: block;
    margin: 16px auto 0;
    background: none;
    border: none;
    color: var(--nh-text-muted);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    text-decoration: underline;
    padding: 4px 8px;
  }
  .reset:hover { color: var(--nh-black); }

  /* Lead capture forms */
  .capture {
    background: white;
    border: 1px solid var(--nh-border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  .capture.bulk {
    background: var(--nh-blue-soft);
    border-color: var(--nh-blue);
  }
  .capture-title {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 500;
    color: var(--nh-black);
    margin-bottom: 4px;
  }
  .capture-sub {
    font-size: 13px;
    color: var(--nh-text-muted);
    line-height: 1.5;
    margin-bottom: 12px;
  }
  .capture-form {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .capture-input {
    flex: 1;
    min-width: 160px;
    padding: 11px 14px;
    border: 1px solid var(--nh-border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    background: white;
    color: var(--nh-text);
    outline: none;
  }
  .capture-input:focus { border-color: var(--nh-slate); }
  .capture-submit {
    padding: 11px 20px;
    background: var(--nh-black);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.02em;
    transition: opacity 0.15s;
  }
  .capture-submit:hover { opacity: 0.85; }
  .capture-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .capture-fine {
    font-size: 11px;
    color: var(--nh-text-muted);
    margin-top: 8px;
    line-height: 1.4;
  }
  .capture-success {
    font-size: 14px;
    color: var(--nh-success);
    font-weight: 500;
    padding: 8px 0;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--nh-black);
    color: white;
    padding: 12px 20px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 1000;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 540px) {
    h1 { font-size: 28px; }
    .container { padding: 20px 16px 48px; }
    .dog-block, .dog-result { padding: 18px; }
    .summary-strip { grid-template-columns: 1fr 1fr; }
    .summary-strip .summary-card:first-child { grid-column: span 2; }
    .recipe-grid { grid-template-columns: 1fr 1fr; }
    .cta { flex: 1 1 100%; }
  }
</style>
</head>
<body>

<main class="container">
  <h1>Calculate how much food your pup needs</h1>
  <p class="lede">Tell us about your dog. We'll show how much they need, what it'll cost, and what to order.</p>

  <a href="/pages/try-a-starter-pack" class="sampler-shortcut" target="_top">

  <div id="dogs-container"></div>

  <button class="add-dog-btn" id="add-dog">+ Add another dog</button>
  <button class="calc-btn" id="calc">Get my plan</button>

  <div class="results hidden" id="results"></div>
</main>

<div class="toast" id="toast"></div>

  function removeDog(id) {
    const idx = dogs.findIndex(d => d.id === id);
    if (idx > -1) {

      const el = document.querySelector(`[data-dog="${id}"]`);

      renumberDogs();

  function renumberDogs() {
    document.querySelectorAll('.dog-block').forEach((block, i) => {
      block.querySelector('.dog-title').textContent = 'Dog ' + (i + 1);
      let removeBtn = block.querySelector('.remove-dog');
      if (i > 0 && !removeBtn) {
        const id = block.dataset.dog;
        const btn = document.createElement('button');
        btn.className = 'remove-dog';
        btn.textContent = 'Remove';
        btn.addEventListener('click', () => removeDog(parseInt(id)));
        block.querySelector('.dog-header').appendChild(btn);
      } else if (i === 0 && removeBtn) {
        removeBtn.remove();
      }
    });
  }

  function wireDog(id) {
    const block = document.querySelector(`[data-dog="${id}"]`);
    const dog = dogs.find(d => d.id === id);

    block.querySelector('[data-input="weight"]').addEventListener('input', e => {
      dog.weight = +e.target.value;
      block.querySelector('[data-out="weight"]').textContent = dog.weight + ' lbs';
    });

    block.querySelectorAll('.pills').forEach(group => {
      const multi = group.dataset.multi === 'true';
      const key = group.dataset.group;
      group.querySelectorAll('.pill').forEach(pill => {
        pill.addEventListener('click', () => {
          if (multi) {
            const isNone = pill.hasAttribute('data-none');
            const pressed = pill.getAttribute('aria-pressed') === 'true';
            if (isNone) {
              group.querySelectorAll('.pill').forEach(p => p.setAttribute('aria-pressed', 'false'));
              pill.setAttribute('aria-pressed', !pressed);
              dog.allergies.clear();
            } else {
              const noneBtn = group.querySelector('[data-none]');
              if (noneBtn) noneBtn.setAttribute('aria-pressed', 'false');
              pill.setAttribute('aria-pressed', !pressed);
              if (!pressed) dog.allergies.add(pill.dataset.value);
              else dog.allergies.delete(pill.dataset.value);
            }
          } else {
            group.querySelectorAll('.pill').forEach(p => p.setAttribute('aria-pressed', 'false'));
            pill.setAttribute('aria-pressed', 'true');
            dog[key] = pill.dataset.value;
          }
        });
      });
    });
  }

  // ─── CALCULATIONS ─────────────────────────────────────────────────
  function lookupOz(recipe, weight, activity) {
    const chart = CHARTS[recipe];
    if (chart.uses) return lookupOz(chart.uses, weight, activity);
    if (chart.max_weight && weight > chart.max_weight) return null;
    if (weight > 150) return null;
    for (const [maxW, vals] of chart.brackets) {
      if (weight <= maxW) return vals[activity];
    }
    return null;
  }

  function calcDog(dog) {
    if (dog.weight > 150) return { tooHeavy: true };

    const allowed = ['Original', 'Beef', 'Pork', 'Lamb'].filter(r => !dog.allergies.has(ALLERGENS[r]));
    if (allowed.length === 0) return { allExcluded: true };

    const allBreakdown = {};
    for (const r of ['Original', 'Beef', 'Pork', 'Lamb']) {
      const oz = lookupOz(r, dog.weight, dog.activity);
      const lbsPerMonth = oz ? (oz * 30) / 16 : null;
      allBreakdown[r] = { oz, lbsPerMonth, allowed: allowed.includes(r) };
    }

    const standardCandidates = ['Original', 'Beef', 'Pork'].filter(r => allowed.includes(r));
    const mixCandidates = standardCandidates.length > 0 ? standardCandidates : allowed;
    const usingLambOnly = mixCandidates.length === 1 && mixCandidates[0] === 'Lamb';

    const share = 1 / mixCandidates.length;
    let mixLbsPerMonth = 0;
    for (const r of mixCandidates) {
      if (allBreakdown[r].lbsPerMonth === null) {
        return calcDogWithoutBeefLamb(dog);
      }
      mixLbsPerMonth += share * allBreakdown[r].lbsPerMonth;
    }

    const sizes = ['5lb', '10lb', '20lb', '30lb'];
    let bestBox = '30lb';
    for (const s of sizes) {
      if (mixLbsPerMonth <= parseInt(s)) { bestBox = s; break; }
    }

    const prices = usingLambOnly ? PRICES_LAMB : PRICES_STANDARD;
    const costs = {};
    for (const s of sizes) costs[s] = mixLbsPerMonth * prices[s].perLb;

    return {
      tooHeavy: false,
      allExcluded: false,
      usingLambOnly,
      allowed,
      allBreakdown,
      mixCandidates,
      mixLbsPerMonth,
      bestBox,
      costs,
      monthlyCost: costs[bestBox]
    };
  }

  function calcDogWithoutBeefLamb(dog) {
    const allowed = ['Original', 'Pork'].filter(r => !dog.allergies.has(ALLERGENS[r]));
    if (allowed.length === 0) return { allExcluded: true };
    const allBreakdown = {};
    for (const r of ['Original', 'Beef', 'Pork', 'Lamb']) {
      const oz = lookupOz(r, dog.weight, dog.activity);
      const lbsPerMonth = oz ? (oz * 30) / 16 : null;
      allBreakdown[r] = { oz, lbsPerMonth, allowed: allowed.includes(r) };
    }
    const share = 1 / allowed.length;
    let mixLbsPerMonth = 0;
    for (const r of allowed) mixLbsPerMonth += share * allBreakdown[r].lbsPerMonth;
    const sizes = ['5lb', '10lb', '20lb', '30lb'];
    let bestBox = '30lb';
    for (const s of sizes) if (mixLbsPerMonth <= parseInt(s)) { bestBox = s; break; }
    const costs = {};
    for (const s of sizes) costs[s] = mixLbsPerMonth * PRICES_STANDARD[s].perLb;
    return {
      tooHeavy: false,
      allExcluded: false,
      usingLambOnly: false,
      heavyDog: true,
      allowed: ['Original', 'Pork'].filter(r => !dog.allergies.has(ALLERGENS[r])),
      allBreakdown,
      mixCandidates: allowed,
      mixLbsPerMonth,
      bestBox,
      costs,
      monthlyCost: costs[bestBox]
    };
  }

  function splitPacks(totalPacks, recipes, allBreakdown) {
    const base = Math.floor(totalPacks / recipes.length);
    const extra = totalPacks % recipes.length;
    const sorted = [...recipes].sort((a,b) => allBreakdown[b].oz - allBreakdown[a].oz);
    const split = {};
    for (const r of recipes) split[r] = base;
    for (let i = 0; i < extra; i++) split[sorted[i]] += 1;
    return split;
  }

  function pickRecommendedRecipe(dog, allowed) {
    if (dog.activity === 'Active' && allowed.includes('Beef')) return 'Beef';
    if (allowed.includes('Original')) return 'Original';
    if (allowed.includes('Beef')) return 'Beef';
    if (allowed.includes('Pork')) return 'Pork';
    return allowed[0];
  }

  function durationForChoice(result, recipe, size) {
    const breakdown = result.allBreakdown[recipe];
    if (!breakdown || !breakdown.oz) return null;
    const totalLbs = parseInt(size);
    const lbsPerDay = breakdown.oz / 16;
    return totalLbs / lbsPerDay;
  }

  function durationForMix(result, size) {
    const totalLbs = parseInt(size);
    const lbsPerDay = result.mixLbsPerMonth / 30;
    return totalLbs / lbsPerDay;
  }

  function boxTotalPrice(size, isLamb) {
    const prices = isLamb ? PRICES_LAMB : PRICES_STANDARD;
    return prices[size].perLb * parseInt(size);
  }

  function buildCartItems(result, selection) {
    const size = selection.size;
    const variants = FRESH_BOX_VARIANTS[size];
    const totalPacks = BOX_PACKS[size].count;
    const items = [];

    if (selection.recipe === 'mix') {
      const split = splitPacks(totalPacks, result.mixCandidates, result.allBreakdown);
      for (const recipe of result.mixCandidates) {
        if (split[recipe] > 0) {
          items.push({ id: variants[recipe], quantity: split[recipe] });
        }
      }
      return { items, split };
    } else {
      items.push({ id: variants[selection.recipe], quantity: totalPacks });
      return { items, split: { [selection.recipe]: totalPacks } };
    }
  }

  function addToCart(allItems) {
    return new Promise((resolve, reject) => {
      const onMessage = (e) => {
        if (!e.data || !e.data.type) return;
        if (e.data.type === 'sage:cartSuccess') {
          window.removeEventListener('message', onMessage);
          clearTimeout(timeout);
          resolve();
        } else if (e.data.type === 'sage:cartError') {
          window.removeEventListener('message', onMessage);
          clearTimeout(timeout);
          reject(new Error(e.data.message || 'Cart add failed'));
        }
      };
      window.addEventListener('message', onMessage);
      const timeout = setTimeout(() => {
        window.removeEventListener('message', onMessage);
        reject(new Error('Timeout — no parent response'));
      }, 10000);
      window.parent.postMessage({ type: 'sage:addToCart', items: allItems }, '*');
    });
  }

  // ─── LEAD SUBMISSION ──────────────────────────────────────────────
  const LEAD_ENDPOINT = 'https://sage-proxy.rick-026.workers.dev/lead';

  function buildPlanSummary(validResults) {
    const dogs = validResults.map(({ dog, result, num }) => {
      const recipeLabel = result.mixCandidates.length === 1
        ? `${result.mixCandidates[0]} Recipe`
        : `Variety mix (${result.mixCandidates.join('+')})`;
      const recommendedPrice = result.costs[result.bestBox];
      const dailyOz = result.mixCandidates.reduce(
        (sum, r) => sum + (1 / result.mixCandidates.length) * result.allBreakdown[r].oz,
        0
      );
      return {
        number: num,
        weight: dog.weight,
        activity: dog.activity,
        allergies: Array.from(dog.allergies),
        mix: result.mixCandidates,
        recommendedBox: result.bestBox,
        chosenLabel: recipeLabel,
        chosenBox: result.bestBox,
        chosenPrice: +recommendedPrice.toFixed(2),
        lbsPerMonth: +result.mixLbsPerMonth.toFixed(1),
        dailyOz: +dailyOz.toFixed(1)
      };
    });
    const lines = dogs.map(d => {
      const allergies = d.allergies.length ? ` (excl. ${d.allergies.join(', ')})` : '';
      return `Dog ${d.number}: ${d.weight}lb ${d.activity}${allergies} → ${d.chosenLabel}, ${d.chosenBox} box · $${d.chosenPrice} (need ~${d.lbsPerMonth}lb/mo)`;
    });
    const totalCost = dogs.reduce((sum, d) => sum + d.chosenPrice, 0);
    return {
      dogs,
      totalMonthlyCost: +totalCost.toFixed(2),
      totalDogs: dogs.length,
      summaryText: lines.join('\n')
    };
  }

  async function submitLead({ phone, name, formType, reason, results }) {
    const summary = buildPlanSummary(results);
    const tags = ['planner-lead'];
    if (formType === 'bulk') tags.push('bulk-eligible');
    if (summary.totalDogs >= 2) tags.push('multi-dog');
    const payload = {
      phone,
      name: name || null,
      formType,
      reason,
      tags,
      source: 'feeding-planner',
      sourceUrl: window.location.href || 'https://shop.naturalhounds.com/pages/calculate-your-plan',
      plan: summary
    };
    const res = await fetch(LEAD_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error('Lead submit failed: ' + res.status);
    return res.json();
  }

        if (!phone) return;
        submitBtn.disabled = true;
        submitBtn.textContent = 'Sending...';
        try {
          await submitLead({ phone, name, formType, reason, results: validResults });
          form.parentElement.innerHTML = `
            <div class="capture-title">Got it ✓</div>
            <div class="capture-success">${formType === 'bulk' ? "We'll text you within the hour with your quote." : "Sent! Check your phone — your plan is on the way."}</div>`;
        } catch (err) {
          submitBtn.disabled = false;
          submitBtn.textContent = formType === 'bulk' ? 'Get my quote' : 'Send it';
          showToast('Something went wrong. Please try again.');
        }
      });
    });
  });

  addDog();

  // ─── IFRAME HEIGHT REPORTING ──────────────────────────────────────
  function reportHeight() {
    if (window.parent === window) return;
    const height = Math.max(
      document.body.scrollHeight,
      document.documentElement.scrollHeight,
      document.body.offsetHeight,
      document.documentElement.offsetHeight
    );
    window.parent.postMessage({ type: 'sage:resize', height: height }, '*');
  }
  if (window.parent !== window) {
    window.addEventListener('load', reportHeight);
    const observer = new MutationObserver(reportHeight);
    observer.observe(document.body, { childList: true, subtree: true, attributes: true });
    window.addEventListener('resize', reportHeight);
  }
})();
</script>
</body>
</html>
