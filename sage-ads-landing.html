<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Natural Hounds — Fresh Dog Food</title>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #9fd1ff;
  --blue-dark: #536479;
  --blue-deeper: #3a4e5e;
  --cream: #f4f9ff;
  --border: #c8ddef;
  --white: #FFFFFF;
  --charcoal: #0f1923;
  --mid: #536479;
  --light: #a8bccf;
}

html, body {
  height: 100%;
  background: var(--cream);
  font-family: 'DM Sans', sans-serif;
  color: var(--charcoal);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── OUTER SHELL ── */
.page {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  width: 100%;
  background: var(--white);
}

/* ── HEADER ── */
.header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 20px;
  height: 64px;
  background: #536479;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.header-logo {
  width: 30px;
  height: 30px;
  object-fit: contain;
  flex-shrink: 0;
  opacity: 0.9;
}

.header-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.header-headline {
  font-family: 'League Spartan', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  line-height: 1.25;
}

.header-sub {
  font-size: 11.5px;
  color: rgba(255,255,255,0.6);
}

.progress-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.8);
  flex-shrink: 0;
  white-space: nowrap;
}

.progress-dots { display: flex; gap: 4px; }

.progress-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  transition: background 0.3s;
}

.progress-dot.active { background: #fff; }
.progress-dot.done   { background: var(--blue); }

/* ── BODY (chat area, centered on wide screens) ── */
.page-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  /* On desktop, center the chat column with a max width */
  width: 100%;
  max-width: 780px;
  margin: 0 auto;
}

/* ── MESSAGES ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px 12px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  scroll-behavior: smooth;
}

.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── BUBBLES ── */
.message {
  display: flex;
  gap: 10px;
  max-width: 88%;
  animation: fadeUp 0.2s ease forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.message.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  margin-top: 3px;
}

.sage-avatar {
  background: var(--blue);
  color: var(--charcoal);
  font-family: 'League Spartan', sans-serif;
  font-size: 12px;
}

.user-avatar {
  background: var(--blue-deeper);
  color: var(--white);
  font-size: 9px;
  letter-spacing: 0.04em;
}

.bubble {
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 15px;
  line-height: 1.65;
}

.message.sage .bubble {
  background: var(--white);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
  color: var(--charcoal);
  font-weight: 400;
  box-shadow: 0 1px 8px rgba(83,100,121,0.08);
  /* Responsive max-width: grows with viewport */
  max-width: min(460px, 72vw);
  overflow: hidden;
}

.message.user .bubble {
  background: var(--blue-deeper);
  color: var(--white);
  border-top-right-radius: 4px;
  font-weight: 500;
  font-size: 14.5px;
  box-shadow: 0 2px 10px rgba(58,78,94,0.25);
}

.bubble strong { font-weight: 600; }
.bubble p { margin-top: 8px; }
.bubble p:first-child { margin-top: 0; }

/* ── RESULT CARD ── */
.result-card {
  background: #f0f7ff;
  border: 1.5px solid var(--blue);
  border-radius: 12px;
  padding: 14px 16px;
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.result-row {
  display: flex;
  justify-content: space-between;
  font-size: 13.5px;
  padding: 3px 0;
  border-bottom: 1px solid rgba(159,209,255,0.4);
}

.result-row:last-child { border-bottom: none; }
.result-row .label { color: var(--mid); }
.result-row .value { font-weight: 600; }
.result-row.highlight .value { color: var(--blue-dark); font-size: 15px; }

/* ── WEIGHT CHIPS ── */
.weight-chips-outer {
  position: relative;
  margin-top: 12px;
  overflow: hidden;
}

.weight-chips-outer::after {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 36px;
  height: 100%;
  background: linear-gradient(to right, transparent, white);
  pointer-events: none;
}

.weight-chips-wrap {
  display: flex;
  flex-wrap: nowrap;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.weight-chips-wrap::-webkit-scrollbar { display: none; }

.weight-chip {
  flex-shrink: 0;
  padding: 8px 14px;
  border-radius: 20px;
  border: 2px solid var(--blue-dark);
  background: rgba(83,100,121,0.05);
  color: var(--blue-dark);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.weight-chip:hover { background: var(--blue-dark); color: var(--white); }

.weight-chip.selected {
  background: var(--blue-deeper);
  color: var(--white);
  border-color: var(--blue-deeper);
  box-shadow: 0 3px 12px rgba(58,78,94,0.35);
  transform: scale(1.03);
}

.weight-chip:disabled { cursor: default; }

/* ── RECIPE BUTTONS ── */
.recipe-buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 12px;
}

.recipe-btn {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  padding: 10px 14px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: var(--white);
  cursor: pointer;
  transition: all 0.15s ease;
  text-align: left;
  width: 100%;
}

.recipe-btn:hover {
  border-color: var(--blue-dark);
  background: rgba(83,100,121,0.04);
}

.recipe-btn.selected {
  border-color: var(--blue-deeper);
  background: rgba(58,78,94,0.06);
  box-shadow: 0 2px 10px rgba(58,78,94,0.15);
}

.recipe-btn:disabled { cursor: default; }

.recipe-name {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--charcoal);
}

.recipe-ing {
  font-size: 11px;
  color: var(--light);
  font-weight: 400;
  line-height: 1.4;
}

/* ── MIX ROW ── */
.result-row.mix-row .label { color: var(--blue-dark); font-style: italic; }
.result-row.mix-row .value { color: var(--blue-dark); font-style: italic; }

/* ── QUICK REPLIES ── */
.quick-replies {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
  margin-top: 12px;
}

.qr-btn {
  padding: 10px 20px;
  border-radius: 22px;
  border: 2px solid var(--blue-dark);
  background: rgba(83,100,121,0.05);
  color: var(--blue-dark);
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.qr-btn:hover { background: var(--blue-dark); color: var(--white); transform: translateY(-1px); }

.qr-btn.selected {
  background: var(--blue-deeper);
  color: var(--white);
  border-color: var(--blue-deeper);
  box-shadow: 0 3px 12px rgba(58,78,94,0.35);
  transform: scale(1.03);
}

.qr-btn:disabled { cursor: default; }

.qr-btn.store-btn {
  flex: 1;
  min-width: 90px;
  text-align: center;
  border-radius: 12px;
  padding: 12px 16px;
}

/* ── CONFIRM CARD ── */
.reserve-confirm {
  background: #edf7ed;
  border: 1.5px solid #7dbd7d;
  border-radius: 10px;
  padding: 13px 15px;
  margin-top: 10px;
  font-size: 13.5px;
  line-height: 1.6;
  color: #1e4d1e;
}

/* ── TYPING INDICATOR ── */
.typing {
  display: flex;
  gap: 10px;
  max-width: 88%;
  animation: fadeUp 0.2s ease forwards;
}

.typing-dots {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 16px;
  border-top-left-radius: 4px;
  padding: 13px 17px;
  display: flex;
  gap: 4px;
  align-items: center;
  box-shadow: 0 1px 8px rgba(83,100,121,0.08);
}

.typing-dots span {
  width: 5px;
  height: 5px;
  background: var(--blue);
  border-radius: 50%;
  animation: bounce 1.2s ease-in-out infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-4px); }
}

/* ── INPUT AREA ── */
.input-area {
  flex-shrink: 0;
  padding: 12px 20px;
  padding-bottom: max(16px, calc(12px + env(safe-area-inset-bottom)));
  border-top: 1.5px solid var(--border);
  background: var(--white);
}

.input-wrap {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--white);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 10px 14px;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.input-wrap:focus-within {
  border-color: var(--blue-dark);
  box-shadow: 0 2px 14px rgba(83,100,121,0.14);
}

#userInput {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 400;
  color: var(--charcoal);
  resize: none;
  line-height: 1.5;
  max-height: 120px;
  min-height: 22px;
}

#userInput::placeholder { color: var(--light); }

.send-btn {
  width: 36px;
  height: 36px;
  background: var(--blue-dark);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
}

.send-btn:hover { background: var(--blue-deeper); }
.send-btn svg { width: 15px; height: 15px; fill: white; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ════════════════════════════════════
   RESPONSIVE BREAKPOINTS
   ════════════════════════════════════ */

/* Tablet — 600px+ : give the chat column a comfortable max width with side padding */
@media (min-width: 600px) {
  .page {
    background: var(--cream);
  }
  .page-body {
    max-width: 680px;
    background: var(--white);
    box-shadow: 0 0 60px rgba(83,100,121,0.10);
  }
  .messages {
    padding: 28px 28px 16px;
  }
  .input-area {
    padding: 14px 24px;
    padding-bottom: 18px;
    border-radius: 0 0 0 0;
  }
  .message.sage .bubble {
    max-width: min(500px, 68vw);
  }
}

/* Desktop — 900px+ : widen the chat, bigger bubbles, roomier padding */
@media (min-width: 900px) {
  .header {
    padding: 0 32px;
    height: 68px;
  }
  .header-headline { font-size: 16px; }
  .page-body {
    max-width: 800px;
  }
  .messages {
    padding: 36px 40px 20px;
    gap: 22px;
  }
  .message {
    max-width: 82%;
  }
  .message.sage .bubble {
    max-width: 580px;
    font-size: 15.5px;
    padding: 14px 18px;
  }
  .message.user .bubble {
    font-size: 15px;
    padding: 13px 18px;
  }
  .input-area {
    padding: 16px 40px 20px;
  }
  .input-wrap {
    padding: 12px 16px;
    border-radius: 16px;
  }
  #userInput { font-size: 15.5px; }
  .send-btn { width: 38px; height: 38px; }
  .bubble { border-radius: 20px; }
  .recipe-buttons { gap: 10px; }
  .recipe-btn { padding: 12px 16px; }
  .recipe-name { font-size: 14.5px; }
  .recipe-ing { font-size: 11.5px; }
  .qr-btn { font-size: 14px; padding: 11px 22px; }
}

/* Large desktop — 1200px+ : cap width, let background show */
@media (min-width: 1200px) {
  .page-body {
    max-width: 860px;
  }
}
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <img src="https://cdn.shopify.com/s/files/1/0270/6777/7113/files/NATURAL_HOUNDS_PREMIUM_1024_x_1024_px_512_x_512_px_24_x_24_in_2.png?v=1774307442" class="header-logo" alt="Natural Hounds">
    <div class="header-text">
      <span class="header-headline">See exactly what to feed your dog — and what it costs</span>
      <span class="header-sub">Most dogs switch easily starting with 1–2 packs</span>
    </div>
    <div class="progress-pill">
      <div class="progress-dots">
        <div class="progress-dot active" id="dot1"></div>
        <div class="progress-dot" id="dot2"></div>
        <div class="progress-dot" id="dot3"></div>
      </div>
      <span id="progressLabel">Quick 3-step plan</span>
    </div>
  </header>

  <div class="page-body">
    <div class="messages" id="messages"></div>

    <div class="input-area" id="inputArea" style="display:none;">
      <div class="input-wrap">
        <textarea id="userInput" placeholder="Ask a question…" rows="1"></textarea>
        <button class="send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>

</div>
<script>
const PROXY_URL = 'https://sage-proxy.rick-026.workers.dev';

const state = {
  stage: 'weight',
  dogWeight: null,
  activityLevel: 'normal',
  recipe: null,
  dailyOz: null,
  monthlyLbs: null,
  monthlyCost: null,
  reserveName: null,
  reservePhone: null,
  reserveStore: null,
};

function updateProgress(step) {
  const ids = ['dot1','dot2','dot3'];
  ids.forEach((id, i) => {
    const d = document.getElementById(id);
    d.classList.remove('active','done');
    if (i + 1 < step) d.classList.add('done');
    else if (i + 1 === step) d.classList.add('active');
  });
  document.getElementById('progressLabel').textContent =
    step === 1 ? 'Quick 3-step plan' : 'Step ' + step + ' of 3';
}

// FEEDING CHARTS
const CHARTS = {
  original: [
    {max:5,normal:3.8,lazy:3.2,active:4.2},{max:10,normal:6.4,lazy:5.3,active:7.1},
    {max:15,normal:8.7,lazy:7.2,active:9.6},{max:20,normal:10.8,lazy:8.9,active:11.9},
    {max:30,normal:14.6,lazy:12.1,active:16.1},{max:40,normal:18.1,lazy:15.0,active:19.9},
    {max:50,normal:21.4,lazy:17.8,active:23.6},{max:60,normal:24.6,lazy:20.4,active:27.0},
    {max:70,normal:27.6,lazy:22.9,active:30.3},{max:80,normal:30.5,lazy:25.3,active:33.5},
    {max:90,normal:33.3,lazy:27.6,active:36.6},{max:100,normal:36.0,lazy:29.9,active:39.6},
    {max:110,normal:38.7,lazy:32.1,active:42.6},{max:120,normal:41.3,lazy:34.3,active:45.5},
    {max:130,normal:43.9,lazy:36.4,active:48.3},{max:140,normal:46.4,lazy:38.5,active:51.0},
    {max:150,normal:48.9,lazy:40.5,active:53.7},
  ],
  beef: [
    {max:5,normal:2.7,lazy:2.2,active:3.0},{max:10,normal:4.5,lazy:3.8,active:5.0},
    {max:15,normal:6.2,lazy:5.1,active:6.8},{max:20,normal:7.6,lazy:6.3,active:8.4},
    {max:30,normal:10.3,lazy:8.6,active:11.4},{max:40,normal:12.8,lazy:10.7,active:14.1},
    {max:50,normal:15.2,lazy:12.6,active:16.7},{max:60,normal:17.4,lazy:14.4,active:19.1},
    {max:70,normal:19.5,lazy:16.2,active:21.5},{max:80,normal:21.6,lazy:17.9,active:23.8},
    {max:90,normal:23.6,lazy:19.6,active:25.9},{max:100,normal:25.5,lazy:21.2,active:28.1},
    {max:110,normal:27.4,lazy:22.8,active:30.2},{max:120,normal:29.3,lazy:24.3,active:32.2},
  ],
  pork: [
    {max:5,normal:2.2,lazy:1.8,active:2.4},{max:10,normal:3.6,lazy:3.0,active:4.0},
    {max:15,normal:4.9,lazy:4.1,active:5.4},{max:20,normal:6.1,lazy:5.1,active:6.7},
    {max:30,normal:8.3,lazy:6.9,active:9.1},{max:40,normal:10.3,lazy:8.5,active:11.3},
    {max:50,normal:12.2,lazy:10.1,active:13.4},{max:60,normal:13.9,lazy:11.6,active:15.3},
    {max:70,normal:15.6,lazy:13.0,active:17.2},{max:80,normal:17.3,lazy:14.3,active:19.0},
    {max:90,normal:18.9,lazy:15.7,active:20.8},{max:100,normal:20.4,lazy:17.0,active:22.5},
  ],
};
CHARTS.lamb = CHARTS.beef;

const PRICE_PER_LB = { original: 4.83, beef: 4.83, pork: 4.83, lamb: 8.67 };

function calcFeeding(recipe, weight, activity) {
  const chart = CHARTS[recipe];
  const row = chart.find(function(r){ return weight <= r.max; });
  if (!row) return null;
  var oz = row[activity] || row.normal;
  var monthlyLbs = Math.round((oz * 30 / 16) * 10) / 10;
  var monthlyCost = Math.round(monthlyLbs * PRICE_PER_LB[recipe]);
  return { oz: oz, monthlyLbs: monthlyLbs, monthlyCost: monthlyCost };
}

function recipeLabel(key) {
  var map = { original: 'Original (Turkey)', beef: 'Beef', pork: 'Pork', lamb: 'Lamb', multiple: 'Beef, Pork & Original Mix' };
  return map[key] || key;
}

function buildSystemPrompt() {
  var base = `You are Sage, Natural Hounds' AI nutrition advisor. Natural Hounds is a premium human-grade dog food company based on Long Island, NY with 3 locations: Port Jefferson (full kitchen), Babylon (full kitchen), and Huntington (satellite location). You are helpful, warm, knowledgeable, and confident — but never pushy or salesy. You sound like a trusted expert, not a chatbot. You are premium and clean in your communication. Keep responses to 2–3 sentences unless a question genuinely requires more detail. Never use excessive emojis.

BRAND VOICE: Premium, clean, minimal. Honest and transparent. Confident but not boastful. You believe in what Natural Hounds makes and let the facts speak for themselves.

=== WHAT NATURAL HOUNDS IS ===
Natural Hounds makes human-grade, freshly cooked dog food. The easiest way to describe it: "home-cooked food for your dog, just done professionally." Every recipe meets AAFCO standards for complete and balanced adult dog nutrition. The food is slow-cooked at low temperatures to preserve maximum nutrition. Very similar to raw food but without the risks of handling raw meat at home. Composition: 80% muscle meat, 10% organ meat, 10% vegetable matter.

=== THE 4 RECIPES ===
ORIGINAL RECIPE (Turkey-based) — $4.83/lb | 34 cal/oz:
Ingredients: Turkey, Sweet Potato, Turkey Liver, Turkey Heart, Pumpkin, Brown Rice, Green Beans, Carrots, Eggs, Coconut Oil, Flax Seed Oil, Natural Hounds Supplement Blend.
NOTE: Always say "ground turkey" not "turkey breast."
Guaranteed Analysis: Crude Protein 7.02% (min.), Crude Fat 5.58% (min.), Crude Fiber 0.45% (max.), Moisture 77.3% (max.)
Best for: sensitive stomachs, pancreatitis (very low fat), general first-timers. Lowest protein and fat of all recipes — ideal for dogs who need a gentler option. Most popular single recipe.

BEEF RECIPE — $4.83/lb | 48 cal/oz:
Ingredients: Ground Beef, Beef Heart, Sweet Potato, Beef Liver, Eggs, Kale, Spinach, Flaxseed Oil, Chia Seeds, Natural Hounds Supplement Blend.
Guaranteed Analysis: Crude Protein 12.8% (min.), Crude Fat 10.4% (min.), Crude Fiber 1.16% (max.), Moisture 70.8% (max.)
Customer favorite. Rich in organ meat and protein. Higher fat content — great for active dogs. Highest fiber of the four recipes.

=== KEY FAQs ===
Is it raw? No — slow-cooked at low temperatures, cooked through. Very similar benefits to raw without the handling risks.
How different from kibble? Kibble is heavily processed at high heat, destroying natural nutrition. Natural Hounds uses whole ingredients, minimal processing, higher moisture, more bioavailable protein.
Is it vet-approved? Formulated to meet AAFCO standards for complete and balanced adult dog nutrition.
Allergies? Lamb is the best novel protein option. Poultry and egg allergies are common and often overlooked — eggs are in all 4 recipes, turkey is in Original. We can customize any recipe to remove ingredients — just call.
Chicken allergy? Chicken and turkey are different proteins. A dog allergic to chicken may tolerate turkey fine.
Pancreatitis? Original Recipe is best — very low fat at 5.58%.
Sensitive stomach? Original Recipe — pumpkin and brown rice are excellent for digestion.
Picky eaters? This is a MAJOR selling point. Picky eaters are some of our best customers — fresh food smells and tastes like real food. Most picky dogs devour it immediately.
Puppies? Very popular. A common approach is mixing with puppy kibble during puppyhood, then transitioning fully as adults. Call the store and ask for an owner for specific puppy guidance.
Seniors? Many senior dogs thrive on fresh food. Higher moisture supports kidney health.
Storage: Freezer (sealed): over 1 year. Fridge (sealed): up to 2 weeks. Fridge (opened): 4-5 days.
Thawing: Best overnight in the fridge. Can also submerge in warm water, microwave briefly, or leave on counter an hour then fridge.
Mixing with kibble: Absolutely fine. Take half of the Natural Hounds daily amount and half of the kibble daily amount (when fed alone). Great for budget-conscious customers.

async function handleFreeform(text) {
  var t = text.toLowerCase();

  // Wants to reserve
  if (t.includes('reserve') || t.includes('claim') || t.includes('sign me up') || t.includes("i'll try") || t.includes('ill try')) {
    state.stage = 'name';
    showTypingThen(500, function() { appendSage("Perfect. What's your name?"); });
    return;
  }

  // Mentions recipes — recalculate
  var hasTurkey = t.includes('turkey') || t.includes('original');
  var hasBeef = t.includes('beef');
  var hasPork = t.includes('pork');
  var hasLamb = t.includes('lamb');
  var recipeCount = [hasTurkey, hasBeef, hasPork, hasLamb].filter(Boolean).length;

  var detectedRecipe = null;
  if (recipeCount >= 2) detectedRecipe = 'multiple';
  else if (hasTurkey) detectedRecipe = 'original';
  else if (hasBeef) detectedRecipe = 'beef';
  else if (hasPork) detectedRecipe = 'pork';
  else if (hasLamb) detectedRecipe = 'lamb';

  if (detectedRecipe) {
    state.stage = 'recipe';
    // If multiple specific recipes detected, calculate their specific mix
    if (detectedRecipe === 'multiple') {
      var mixRecipes = [];
      if (hasBeef) mixRecipes.push('beef');
      if (hasTurkey) mixRecipes.push('original');
      if (hasPork) mixRecipes.push('pork');
      if (hasLamb) mixRecipes.push('lamb');

      var calcs = mixRecipes.map(function(r) { return calcFeeding(r, state.dogWeight, state.activityLevel); }).filter(Boolean);
      if (!calcs.length) { appendSage("Your dog's size is outside our standard chart. Give us a call at 631-760-7850."); return; }

      var avgOz   = Math.round((calcs.reduce(function(s,c){ return s + c.oz; }, 0) / calcs.length) * 10) / 10;
      var avgLbs  = Math.round((calcs.reduce(function(s,c){ return s + c.monthlyLbs; }, 0) / calcs.length) * 10) / 10;
      var avgCost = Math.round(calcs.reduce(function(s,c){ return s + c.monthlyCost; }, 0) / calcs.length);
      var mixLabel = mixRecipes.map(function(r){ return recipeLabel(r); }).join(' & ') + ' Mix';

      state.recipe = 'multiple';
      state.dailyOz = avgOz;
      state.monthlyLbs = avgLbs;
      state.monthlyCost = avgCost;
      state.stage = 'confirmed';
      updateProgress(3);

      showTypingThen(700, function() {
        var msgEl = appendSage('Here\'s the breakdown for a ' + mixLabel + ' for your ' + state.dogWeight + 'lb dog:');
        addResultCard(msgEl, { oz: avgOz, monthlyLbs: avgLbs, monthlyCost: avgCost }, 'multiple', mixLabel);
        setTimeout(function() {
          state.stage = 'reserve_yn';
          var followUp = appendSage('Ready to claim your starter pack?');
          addQuickReplies(followUp, [
            { label: '🐾 Claim your starter pack', value: 'yes' },
            { label: '💬 I have a question first', value: 'question' },
          ], handleReserveYN);
        }, 900);
      });
    } else {
      handleRecipe(detectedRecipe);
    }
    return;
  }

  await askClaude(text, true);
}

  showTypingThen(700, function() {

    var btn = document.createElement('button');
    btn.className = 'weight-chip';
    btn.textContent = w === 150 ? '150+ lbs' : w + ' lbs';
    (function(weight, button) {
      button.onclick = function() {
        wrap.querySelectorAll('.weight-chip').forEach(function(b) { b.disabled = true; b.classList.remove('selected'); });
        button.classList.add('selected');
        appendUser(button.textContent);
        setTimeout(function() { handleWeight(String(weight)); }, 200);
      };
    })(w, btn);
    wrap.appendChild(btn);
  });

  outer.appendChild(wrap);
  bubble.appendChild(outer);
  scrollBottom();
}

function addQuickReplies(msgEl, options, handler) {
  var bubble = msgEl.querySelector('.bubble');
  var wrap = document.createElement('div');
  wrap.className = 'quick-replies';
  options.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt.label;
    (function(o, button) {
      button.onclick = function() {
        wrap.querySelectorAll('.qr-btn').forEach(function(b) { b.classList.remove('selected'); b.disabled = true; });
        button.classList.add('selected');
        appendUser(o.label);
        setTimeout(function() { handler(o.value); }, 200);
      };
    })(opt, btn);
    wrap.appendChild(btn);
  });
  bubble.appendChild(wrap);
  scrollBottom();
}

function addStorePicker(msgEl) {
  var bubble = msgEl.querySelector('.bubble');
  var wrap = document.createElement('div');
  wrap.className = 'quick-replies';
  ['Babylon', 'Port Jefferson', 'Huntington'].forEach(function(store) {
    var btn = document.createElement('button');
    btn.className = 'qr-btn store-btn';
    btn.textContent = store;
    (function(s, button) {
      button.onclick = function() {
        wrap.querySelectorAll('.qr-btn').forEach(function(b) { b.disabled = true; b.classList.remove('selected'); });
        button.classList.add('selected');
        appendUser(s);
        setTimeout(function() { handleStore(s); }, 200);
      };
    })(store, btn);
    wrap.appendChild(btn);
  });
  bubble.appendChild(wrap);
  scrollBottom();
}

function addResultCard(msgEl, calc, recipe, customLabel) {
  var bubble = msgEl.querySelector('.bubble');
  var card = document.createElement('div');
  card.className = 'result-card';
  var mixCost = Math.round(calc.monthlyCost * 0.5);
  var isMix = recipe === 'multiple';
  var label = customLabel || recipeLabel(recipe);
  card.innerHTML =
    '<div class="result-row"><span class="label">Recipe</span><span class="value">' + label + '</span></div>' +
    '<div class="result-row"><span class="label">Daily amount</span><span class="value">' + calc.oz + ' oz/day</span></div>' +
    '<div class="result-row"><span class="label">Monthly need</span><span class="value">' + calc.monthlyLbs + ' lbs</span></div>' +
    '<div class="result-row highlight"><span class="label">Monthly cost</span><span class="value">~$' + calc.monthlyCost + '/mo</span></div>' +
    (isMix ? '' : '') + '<div class="result-row mix-row"><span class="label">Mixed with kibble</span><span class="value">~$' + mixCost + '/mo</span></div>';
  bubble.appendChild(card);
  scrollBottom();
}

const INGREDIENTS = {
  beef:     'Ground Beef, Beef Heart, Sweet Potato, Beef Liver, Eggs, Kale, Spinach, Flaxseed Oil, Chia Seeds',
  original: 'Turkey, Sweet Potato, Turkey Liver, Turkey Heart, Pumpkin, Brown Rice, Green Beans, Carrots, Eggs, Coconut Oil',
  pork:     'Ground Pork, Sweet Potato, Pumpkin, Pork Liver, Broccoli, Kale, Eggs',
  lamb:     'Ground Lamb, Cauliflower, Carrots, Lamb Liver, Eggs, Blueberries, Spinach, Flaxseed Oil',
};

function addRecipeButtons(msgEl) {
  var bubble = msgEl.querySelector('.bubble');
  var wrap = document.createElement('div');
  wrap.className = 'recipe-buttons';

  var recipes = [
    { key: 'beef',     label: 'Beef' },
    { key: 'original', label: 'Original (Turkey)' },
    { key: 'pork',     label: 'Pork' },
    { key: 'lamb',     label: 'Lamb' },
    { key: 'multiple', label: '🔀 Mix / Not sure' },
  ];

  recipes.forEach(function(r) {
    var btn = document.createElement('button');
    btn.className = 'recipe-btn';
    var ing = INGREDIENTS[r.key] ? '<span class="recipe-ing">' + INGREDIENTS[r.key] + '</span>' : '';
    btn.innerHTML = '<span class="recipe-name">' + r.label + '</span>' + ing;
    (function(recipe, button) {
      button.onclick = function() {
        wrap.querySelectorAll('.recipe-btn').forEach(function(b) { b.disabled = true; b.classList.remove('selected'); });
        button.classList.add('selected');
        appendUser(recipe.label);
        setTimeout(function() { handleRecipe(recipe.key); }, 200);
      };
    })(r, btn);
    wrap.appendChild(btn);
  });

  bubble.appendChild(wrap);
  scrollBottom();
}

function addConfirmCard(msgEl) {
  var bubble = msgEl.querySelector('.bubble');
  var card = document.createElement('div');
  card.className = 'reserve-confirm';
  card.innerHTML = "We'll text you to confirm pickup at <strong>" + state.reserveStore + "</strong>. See you soon 👍";
  bubble.appendChild(card);
  scrollBottom();
}

function showTypingThen(delay, fn) {
  showTyping();
  setTimeout(function() { hideTyping(); fn(); }, delay);
}

function showTyping() {
  isTyping = true;
  var container = document.getElementById('messages');
  var t = document.createElement('div');
  t.className = 'typing';
  t.id = 'typingIndicator';
  t.innerHTML = '<div class="avatar sage-avatar">S</div><div class="typing-dots"><span></span><span></span><span></span></div>';
  container.appendChild(t);
  scrollBottom();
}

function hideTyping() {
  isTyping = false;
  var t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function scrollBottom() {
  var c = document.getElementById('messages');
  c.scrollTop = c.scrollHeight;
}

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', function() { setTimeout(scrollBottom, 50); });
  document.getElementById('userInput').addEventListener('focus', function() { setTimeout(scrollBottom, 300); });
}
</script>
</body>
</html>
