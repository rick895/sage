<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Natural Hounds — Fresh Dog Food</title>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #9fd1ff;
  --blue-dark: #536479;
  --blue-deeper: #3a4e5e;
  --cream: #f4f9ff;
  --border: #c8ddef;
  --white: #FFFFFF;
  --charcoal: #0f1923;
  --mid: #536479;
  --light: #a8bccf;
}

html, body {
  height: 100%;
  background: var(--cream);
  font-family: 'DM Sans', sans-serif;
  color: var(--charcoal);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

.page {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 640px;
  margin: 0 auto;
  background: var(--white);
  box-shadow: 0 0 40px rgba(83,100,121,0.08);
}

/* HEADER */
.header {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 16px;
  height: 68px;
  background: #536479;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.header-logo {
  width: 30px;
  height: 30px;
  object-fit: contain;
  flex-shrink: 0;
  opacity: 0.9;
}

.header-text {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.header-headline {
  font-family: 'League Spartan', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  line-height: 1.25;
}

.header-sub {
  font-size: 11.5px;
  color: rgba(255,255,255,0.6);
}

.progress-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.8);
  flex-shrink: 0;
  white-space: nowrap;
}

.progress-dots { display: flex; gap: 4px; }

.progress-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  transition: background 0.3s;
}

.progress-dot.active { background: #fff; }
.progress-dot.done   { background: var(--blue); }

/* MESSAGES */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 12px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  scroll-behavior: smooth;
}

.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* BUBBLES */
.message {
  display: flex;
  gap: 10px;
  max-width: 92%;
  animation: fadeUp 0.2s ease forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.message.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

.avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  margin-top: 3px;
}

.sage-avatar {
  background: var(--blue);
  color: var(--charcoal);
  font-family: 'League Spartan', sans-serif;
  font-size: 12px;
}

.user-avatar {
  background: var(--blue-deeper);
  color: var(--white);
  font-size: 9px;
  letter-spacing: 0.04em;
}

.bubble {
  padding: 12px 15px;
  border-radius: 16px;
  font-size: 14.5px;
  line-height: 1.6;
}

.message.sage .bubble {
  background: var(--white);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
  color: var(--charcoal);
  font-weight: 400;
  box-shadow: 0 1px 8px rgba(83,100,121,0.08);
  max-width: 280px;
  overflow: hidden;
}

.message.user .bubble {
  background: var(--blue-deeper);
  color: var(--white);
  border-top-right-radius: 4px;
  font-weight: 500;
  font-size: 14px;
  box-shadow: 0 2px 10px rgba(58,78,94,0.25);
}

.bubble strong { font-weight: 600; }
.bubble p { margin-top: 8px; }
.bubble p:first-child { margin-top: 0; }

/* RESULT CARD */
.result-card {
  background: #f0f7ff;
  border: 1.5px solid var(--blue);
  border-radius: 12px;
  padding: 14px 16px;
  margin-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.result-row {
  display: flex;
  justify-content: space-between;
  font-size: 13.5px;
  padding: 3px 0;
  border-bottom: 1px solid rgba(159,209,255,0.4);
}

.result-row:last-child { border-bottom: none; }
.result-row .label { color: var(--mid); }
.result-row .value { font-weight: 600; }
.result-row.highlight .value { color: var(--blue-dark); font-size: 15px; }

/* WEIGHT CHIPS */
.weight-chips-outer {
  position: relative;
  margin-top: 12px;
  overflow: hidden;
}

.weight-chips-outer::after {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 36px;
  height: 100%;
  background: linear-gradient(to right, transparent, white);
  pointer-events: none;
}

.weight-chips-wrap {
  display: flex;
  flex-wrap: nowrap;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.weight-chips-wrap::-webkit-scrollbar { display: none; }

.weight-chip {
  flex-shrink: 0;
  padding: 8px 14px;
  border-radius: 20px;
  border: 2px solid var(--blue-dark);
  background: rgba(83,100,121,0.05);
  color: var(--blue-dark);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.weight-chip:hover { background: var(--blue-dark); color: var(--white); }

.weight-chip.selected {
  background: var(--blue-deeper);
  color: var(--white);
  border-color: var(--blue-deeper);
  box-shadow: 0 3px 12px rgba(58,78,94,0.35);
  transform: scale(1.03);
}

.weight-chip:disabled { cursor: default; }

/* RECIPE BUTTONS */
.recipe-buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 12px;
}

.recipe-btn {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  padding: 10px 14px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: var(--white);
  cursor: pointer;
  transition: all 0.15s ease;
  text-align: left;
  width: 100%;
}

.recipe-btn:hover {
  border-color: var(--blue-dark);
  background: rgba(83,100,121,0.04);
}

.recipe-btn.selected {
  border-color: var(--blue-deeper);
  background: rgba(58,78,94,0.06);
  box-shadow: 0 2px 10px rgba(58,78,94,0.15);
}

.recipe-btn:disabled { cursor: default; }

.recipe-name {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--charcoal);
}

.recipe-ing {
  font-size: 11px;
  color: var(--light);
  font-weight: 400;
  line-height: 1.4;
}

/* MIX ROW */
.result-row.mix-row .label { color: var(--blue-dark); font-style: italic; }
.result-row.mix-row .value { color: var(--blue-dark); font-style: italic; }
.quick-replies {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
  margin-top: 12px;
}

.qr-btn {
  padding: 10px 20px;
  border-radius: 22px;
  border: 2px solid var(--blue-dark);
  background: rgba(83,100,121,0.05);
  color: var(--blue-dark);
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.qr-btn:hover { background: var(--blue-dark); color: var(--white); transform: translateY(-1px); }

.qr-btn.selected {
  background: var(--blue-deeper);
  color: var(--white);
  border-color: var(--blue-deeper);
  box-shadow: 0 3px 12px rgba(58,78,94,0.35);
  transform: scale(1.03);
}

.qr-btn:disabled { cursor: default; }

.qr-btn.store-btn {
  flex: 1;
  min-width: 90px;
  text-align: center;
  border-radius: 12px;
  padding: 12px 16px;
}

/* CONFIRM CARD */
.reserve-confirm {
  background: #edf7ed;
  border: 1.5px solid #7dbd7d;
  border-radius: 10px;
  padding: 13px 15px;
  margin-top: 10px;
  font-size: 13.5px;
  line-height: 1.6;
  color: #1e4d1e;
}

/* TYPING */
.typing {
  display: flex;
  gap: 10px;
  max-width: 88%;
  animation: fadeUp 0.2s ease forwards;
}

.typing-dots {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 16px;
  border-top-left-radius: 4px;
  padding: 13px 17px;
  display: flex;
  gap: 4px;
  align-items: center;
  box-shadow: 0 1px 8px rgba(83,100,121,0.08);
}

.typing-dots span {
  width: 5px;
  height: 5px;
  background: var(--blue);
  border-radius: 50%;
  animation: bounce 1.2s ease-in-out infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-4px); }
}

/* INPUT */
.input-area {
  flex-shrink: 0;
  padding: 12px 16px;
  padding-bottom: max(16px, calc(12px + env(safe-area-inset-bottom)));
  border-top: 1.5px solid var(--border);
  background: var(--white);
}

.input-wrap {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--white);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 10px 14px;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.input-wrap:focus-within {
  border-color: var(--blue-dark);
  box-shadow: 0 2px 14px rgba(83,100,121,0.14);
}

#userInput {
  flex: 1;
  border: none;
  outline: none;
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  font-weight: 400;
  color: var(--charcoal);
  resize: none;
  line-height: 1.5;
  max-height: 100px;
  min-height: 22px;
}

#userInput::placeholder { color: var(--light); }

.send-btn {
  width: 34px;
  height: 34px;
  background: var(--blue-dark);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s;
}

.send-btn:hover { background: var(--blue-deeper); }
.send-btn svg { width: 14px; height: 14px; fill: white; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

@media (max-width: 480px) {
  .page { max-width: 100%; box-shadow: none; }
}
</style>
</head>
<body>
<div class="page">

  <header class="header">
    <img src="https://cdn.shopify.com/s/files/1/0270/6777/7113/files/NATURAL_HOUNDS_PREMIUM_1024_x_1024_px_512_x_512_px_24_x_24_in_2.png?v=1774307442" class="header-logo" alt="Natural Hounds">
    <div class="header-text">
      <span class="header-headline">See exactly what to feed your dog — and what it costs</span>
      <span class="header-sub">Most dogs switch easily starting with 1–2 packs</span>
    </div>
    <div class="progress-pill">
      <div class="progress-dots">
        <div class="progress-dot active" id="dot1"></div>
        <div class="progress-dot" id="dot2"></div>
        <div class="progress-dot" id="dot3"></div>
      </div>
      <span id="progressLabel">Quick 3-step plan</span>
    </div>
  </header>

  <div class="messages" id="messages"></div>

  <div class="input-area" id="inputArea" style="display:none;">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Ask a question…" rows="1"></textarea>
      <button class="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

</div>
<script>
const PROXY_URL = 'https://sage-proxy.rick-026.workers.dev';

const state = {
  stage: 'weight',
  dogWeight: null,
  activityLevel: 'normal',
  recipe: null,
  dailyOz: null,
  monthlyLbs: null,
  monthlyCost: null,
  reserveName: null,
  reservePhone: null,
  reserveStore: null,
};

function updateProgress(step) {
  const ids = ['dot1','dot2','dot3'];
  ids.forEach((id, i) => {
    const d = document.getElementById(id);
    d.classList.remove('active','done');
    if (i + 1 < step) d.classList.add('done');
    else if (i + 1 === step) d.classList.add('active');
  });
  document.getElementById('progressLabel').textContent =
    step === 1 ? 'Quick 3-step plan' : 'Step ' + step + ' of 3';
}

// FEEDING CHARTS
const CHARTS = {
  original: [
    {max:5,normal:3.8,lazy:3.2,active:4.2},{max:10,normal:6.4,lazy:5.3,active:7.1},
    {max:15,normal:8.7,lazy:7.2,active:9.6},{max:20,normal:10.8,lazy:8.9,active:11.9},
    {max:30,normal:14.6,lazy:12.1,active:16.1},{max:40,normal:18.1,lazy:15.0,active:19.9},
    {max:50,normal:21.4,lazy:17.8,active:23.6},{max:60,normal:24.6,lazy:20.4,active:27.0},
    {max:70,normal:27.6,lazy:22.9,active:30.3},{max:80,normal:30.5,lazy:25.3,active:33.5},
    {max:90,normal:33.3,lazy:27.6,active:36.6},{max:100,normal:36.0,lazy:29.9,active:39.6},
    {max:110,normal:38.7,lazy:32.1,active:42.6},{max:120,normal:41.3,lazy:34.3,active:45.5},
    {max:130,normal:43.9,lazy:36.4,active:48.3},{max:140,normal:46.4,lazy:38.5,active:51.0},
    {max:150,normal:48.9,lazy:40.5,active:53.7},
  ],
  beef: [
    {max:5,normal:2.7,lazy:2.2,active:3.0},{max:10,normal:4.5,lazy:3.8,active:5.0},
    {max:15,normal:6.2,lazy:5.1,active:6.8},{max:20,normal:7.6,lazy:6.3,active:8.4},
    {max:30,normal:10.3,lazy:8.6,active:11.4},{max:40,normal:12.8,lazy:10.7,active:14.1},
    {max:50,normal:15.2,lazy:12.6,active:16.7},{max:60,normal:17.4,lazy:14.4,active:19.1},
    {max:70,normal:19.5,lazy:16.2,active:21.5},{max:80,normal:21.6,lazy:17.9,active:23.8},
    {max:90,normal:23.6,lazy:19.6,active:25.9},{max:100,normal:25.5,lazy:21.2,active:28.1},
    {max:110,normal:27.4,lazy:22.8,active:30.2},{max:120,normal:29.3,lazy:24.3,active:32.2},
  ],
  pork: [
    {max:5,normal:2.2,lazy:1.8,active:2.4},{max:10,normal:3.6,lazy:3.0,active:4.0},
    {max:15,normal:4.9,lazy:4.1,active:5.4},{max:20,normal:6.1,lazy:5.1,active:6.7},
    {max:30,normal:8.3,lazy:6.9,active:9.1},{max:40,normal:10.3,lazy:8.5,active:11.3},
    {max:50,normal:12.2,lazy:10.1,active:13.4},{max:60,normal:13.9,lazy:11.6,active:15.3},
    {max:70,normal:15.6,lazy:13.0,active:17.2},{max:80,normal:17.3,lazy:14.3,active:19.0},
    {max:90,normal:18.9,lazy:15.7,active:20.8},{max:100,normal:20.4,lazy:17.0,active:22.5},
  ],
};
CHARTS.lamb = CHARTS.beef;

const PRICE_PER_LB = { original: 4.83, beef: 4.83, pork: 4.83, lamb: 8.67 };

function calcFeeding(recipe, weight, activity) {
  const chart = CHARTS[recipe];
  const row = chart.find(function(r){ return weight <= r.max; });
  if (!row) return null;
  var oz = row[activity] || row.normal;
  var monthlyLbs = Math.round((oz * 30 / 16) * 10) / 10;
  var monthlyCost = Math.round(monthlyLbs * PRICE_PER_LB[recipe]);
  return { oz: oz, monthlyLbs: monthlyLbs, monthlyCost: monthlyCost };
}

function recipeLabel(key) {
  var map = { original: 'Original (Turkey)', beef: 'Beef', pork: 'Pork', lamb: 'Lamb', multiple: 'Beef, Pork & Original Mix' };
  return map[key] || key;
}

function buildSystemPrompt() {
  var base = 'You are Sage, a friendly advisor for Natural Hounds — fresh human-grade dog food on Long Island, NY. 4 recipes: Beef ($4.83/lb, 48 cal/oz), Original Turkey ($4.83/lb, 34 cal/oz), Pork ($4.83/lb, 60 cal/oz), Lamb ($8.67/lb, 48 cal/oz). Stores: Babylon, Port Jefferson, Huntington. Hours: Tues-Sat 10am-6pm, Sun 10am-3pm. Keep responses to 2-3 sentences. Be direct and confident. Do not ask for email or dog name.';
  if (state.dogWeight && state.dailyOz && state.monthlyCost) {
    base += ' IMPORTANT CONTEXT: This dog weighs ' + state.dogWeight + 'lbs, needs ' + state.dailyOz + ' oz/day, costs ~$' + state.monthlyCost + '/mo on ' + recipeLabel(state.recipe) + '. Use these exact numbers when answering cost or feeding questions — do not estimate or guess.';
  }
  return base;
}

var chatHistory = [];
var isTyping = false;

window.addEventListener('DOMContentLoaded', function() {
  var msg = appendSage("Let's figure out exactly how much your dog should eat and what it would cost.\n\nWhat's your dog's weight?");
  addWeightChips(msg);
  state.stage = 'weight';
  updateProgress(1);

  var input = document.getElementById('userInput');
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  input.addEventListener('input', function() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  });
});

async function sendMessage(overrideText) {
  var input = document.getElementById('userInput');
  var text = (overrideText || input.value).trim();
  if (!text) return;
  if (isTyping && state.stage !== 'freeform') return;
  input.value = '';
  input.style.height = 'auto';
  appendUser(text);

  if (state.stage === 'weight')     return handleWeight(text);
  if (state.stage === 'activity')   return handleActivity(text);
  if (state.stage === 'recipe')     return handleRecipe(text);
  if (state.stage === 'reserve_yn') return handleReserveYN(text);
  if (state.stage === 'name')       return handleName(text);
  if (state.stage === 'phone')      return handlePhone(text);
  if (state.stage === 'store')      return handleStore(text);
  if (state.stage === 'freeform')   return handleFreeform(text);
  await askClaude(text);
}

async function handleFreeform(text) {
  var t = text.toLowerCase();

  // Wants to reserve
  if (t.includes('reserve') || t.includes('sign me up') || t.includes("i'll try") || t.includes('ill try')) {
    state.stage = 'name';
    showTypingThen(500, function() { appendSage("Perfect. What's your name?"); });
    return;
  }

  // Mentions recipes — recalculate
  var hasTurkey = t.includes('turkey') || t.includes('original');
  var hasBeef = t.includes('beef');
  var hasPork = t.includes('pork');
  var hasLamb = t.includes('lamb');
  var recipeCount = [hasTurkey, hasBeef, hasPork, hasLamb].filter(Boolean).length;

  var detectedRecipe = null;
  if (recipeCount >= 2) detectedRecipe = 'multiple';
  else if (hasTurkey) detectedRecipe = 'original';
  else if (hasBeef) detectedRecipe = 'beef';
  else if (hasPork) detectedRecipe = 'pork';
  else if (hasLamb) detectedRecipe = 'lamb';

  if (detectedRecipe) {
    state.stage = 'recipe';
    // If multiple specific recipes detected, calculate their specific mix
    if (detectedRecipe === 'multiple') {
      var mixRecipes = [];
      if (hasBeef) mixRecipes.push('beef');
      if (hasTurkey) mixRecipes.push('original');
      if (hasPork) mixRecipes.push('pork');
      if (hasLamb) mixRecipes.push('lamb');

      var calcs = mixRecipes.map(function(r) { return calcFeeding(r, state.dogWeight, state.activityLevel); }).filter(Boolean);
      if (!calcs.length) { appendSage("Your dog's size is outside our standard chart. Give us a call at 631-760-7850."); return; }

      var avgOz   = Math.round((calcs.reduce(function(s,c){ return s + c.oz; }, 0) / calcs.length) * 10) / 10;
      var avgLbs  = Math.round((calcs.reduce(function(s,c){ return s + c.monthlyLbs; }, 0) / calcs.length) * 10) / 10;
      var avgCost = Math.round(calcs.reduce(function(s,c){ return s + c.monthlyCost; }, 0) / calcs.length);
      var mixLabel = mixRecipes.map(function(r){ return recipeLabel(r); }).join(' & ') + ' Mix';

      state.recipe = 'multiple';
      state.dailyOz = avgOz;
      state.monthlyLbs = avgLbs;
      state.monthlyCost = avgCost;
      state.stage = 'confirmed';
      updateProgress(3);

      showTypingThen(700, function() {
        var msgEl = appendSage('Here\'s the breakdown for a ' + mixLabel + ' for your ' + state.dogWeight + 'lb dog:');
        addResultCard(msgEl, { oz: avgOz, monthlyLbs: avgLbs, monthlyCost: avgCost }, 'multiple', mixLabel);
        setTimeout(function() {
          state.stage = 'reserve_yn';
          var followUp = appendSage('Want to try it?');
          addQuickReplies(followUp, [
            { label: '✅ Reserve a pack', value: 'yes' },
            { label: '💬 I have a question first', value: 'question' },
          ], handleReserveYN);
        }, 900);
      });
    } else {
      handleRecipe(detectedRecipe);
    }
    return;
  }

  await askClaude(text, true);
}

function handleWeight(text) {
  var match = text.match(/(\d+)/);
  if (!match || parseInt(match[1]) < 2 || parseInt(match[1]) > 200) {
    appendSage('Just need the weight in pounds — something like "45" works fine.');
    return;
  }
  state.dogWeight = parseInt(match[1]);
  state.stage = 'activity';
  showTypingThen(600, function() {
    var msg = appendSage('Got it. How active is your dog?');
    addQuickReplies(msg, [
      { label: '🛋️ Pretty lazy', value: 'lazy' },
      { label: '🐕 Normal', value: 'normal' },
      { label: '⚡ Very active', value: 'active' },
    ], handleActivity);
  });
}

function handleActivity(text) {
  var t = text.toLowerCase();
  if (t.includes('lazy') || t.includes('couch') || t.includes('low')) {
    state.activityLevel = 'lazy';
  } else if (t.includes('active') || t.includes('runs') || t.includes('athletic')) {
    state.activityLevel = 'active';
  } else {
    state.activityLevel = 'normal';
  }
  state.stage = 'recipe';
  updateProgress(2);
  showTypingThen(600, function() {
    var msg = appendSage("We have 4 recipes — pick whichever sounds best for your dog:");
    addRecipeButtons(msg);
  });
}

function handleRecipe(text) {
  var t = text.toLowerCase();

  // Multiple / variety
  if (t.includes('multiple') || t.includes('variety') || t.includes('mix') || t.includes('not sure')) {
    state.recipe = 'multiple';
    var calcBeef = calcFeeding('beef', state.dogWeight, state.activityLevel);
    var calcPork = calcFeeding('pork', state.dogWeight, state.activityLevel);
    var calcOrig = calcFeeding('original', state.dogWeight, state.activityLevel);
    if (!calcBeef || !calcPork || !calcOrig) {
      appendSage("Your dog's size is outside our standard chart. Give us a call at 631-760-7850.");
      return;
    }
    var avgOz = Math.round(((calcBeef.oz + calcPork.oz + calcOrig.oz) / 3) * 10) / 10;
    var avgLbs = Math.round(((calcBeef.monthlyLbs + calcPork.monthlyLbs + calcOrig.monthlyLbs) / 3) * 10) / 10;
    var avgCost = Math.round((calcBeef.monthlyCost + calcPork.monthlyCost + calcOrig.monthlyCost) / 3);
    state.dailyOz = avgOz;
    state.monthlyLbs = avgLbs;
    state.monthlyCost = avgCost;
    state.stage = 'confirmed';
    updateProgress(3);
    showTypingThen(700, function() {
      var msgEl = appendSage("Our most popular variety mix is Beef, Pork & Original — here's the breakdown for your " + state.dogWeight + "lb dog:");
      addResultCard(msgEl, { oz: avgOz, monthlyLbs: avgLbs, monthlyCost: avgCost }, 'multiple');
      setTimeout(function() {
        state.stage = 'reserve_yn';
        var followUp = appendSage('Want to try it?');
        addQuickReplies(followUp, [
          { label: '✅ Reserve a pack', value: 'yes' },
          { label: '💬 I have a question first', value: 'question' },
        ], handleReserveYN);
      }, 900);
    });
    return;
  }

  var recipe = 'beef';
  if (t.includes('original') || t.includes('turkey')) recipe = 'original';
  else if (t.includes('pork')) recipe = 'pork';
  else if (t.includes('lamb')) recipe = 'lamb';

  state.recipe = recipe;
  var calc = calcFeeding(recipe, state.dogWeight, state.activityLevel);

  if (!calc) {
    appendSage("Your dog's size is outside our standard chart. Give us a call at 631-760-7850.");
    return;
  }

  state.dailyOz = calc.oz;
  state.monthlyLbs = calc.monthlyLbs;
  state.monthlyCost = calc.monthlyCost;
  state.stage = 'confirmed';
  updateProgress(3);

  showTypingThen(700, function() {
    var msgEl = appendSage('Here\'s what your ' + state.dogWeight + 'lb dog needs on ' + recipeLabel(recipe) + ':');
    addResultCard(msgEl, calc, recipe);
    setTimeout(function() {
      state.stage = 'reserve_yn';
      var followUp = appendSage('Want to try it?');
      addQuickReplies(followUp, [
        { label: '✅ Reserve a pack', value: 'yes' },
        { label: '💬 I have a question first', value: 'question' },
      ], handleReserveYN);
    }, 900);
  });
}

function showInput() {
  var inputArea = document.getElementById('inputArea');
  inputArea.style.display = 'block';
  setTimeout(function() { document.getElementById('userInput').focus(); }, 100);
  scrollBottom();
}

function handleReserveYN(text) {
  var t = text.toLowerCase();
  if (t.includes('question') || t.includes('actually') || t.includes('wait') || t.includes('sorry') || t.includes('hang on')) {
    state.stage = 'freeform';
    showInput();
    showTypingThen(400, function() {
      appendSage("Go ahead — what's on your mind?");
    });
  } else if (t.includes('yes') || t.includes('reserve') || t.includes('sure') || t.includes('ok') || t.includes('yeah') || t.includes('please') || t.includes('let') || t.includes('do it')) {
    state.stage = 'name';
    showInput();
    showTypingThen(500, function() { appendSage("Perfect. What's your name?"); });
  } else if (t.includes('no') || t.includes('not yet') || t.includes('maybe later') || t.includes('pass')) {
    showTypingThen(400, function() {
      appendSage("No problem. We're in Babylon, Port Jefferson, and Huntington — Tues-Sat 10am-6pm, Sun 10am-3pm.");
      state.stage = 'done';
    });
  } else {
    // Ambiguous — treat as a question
    state.stage = 'freeform';
    showInput();
    showTypingThen(400, function() {
      appendSage("Go ahead — what's on your mind?");
    });
  }
}

function handleName(text) {
  if (text.length < 2) { appendSage("What's your name?"); return; }
  state.reserveName = text.trim();
  state.stage = 'phone';
  showTypingThen(400, function() {
    appendSage('Got it, ' + state.reserveName.split(' ')[0] + '. Best phone number?');
  });
}

function handlePhone(text) {
  var digits = text.replace(/\D/g, '');
  if (digits.length < 10) {
    appendSage('Just need a 10-digit number so we can text you.');
    return;
  }
  state.reservePhone = digits;
  state.stage = 'store';
  showTypingThen(400, function() {
    var msg = appendSage('Which location is easiest for you?');
    addStorePicker(msg);
  });
}

function handleStore(text) {
  var t = text.toLowerCase();
  var store = '';
  if (t.includes('babylon')) store = 'Babylon';
  else if (t.includes('port') || t.includes('jeff')) store = 'Port Jefferson';
  else if (t.includes('huntington')) store = 'Huntington';
  else {
    appendSage('Which location — Babylon, Port Jefferson, or Huntington?');
    return;
  }
  state.reserveStore = store;
  state.stage = 'done';
  submitReservation();
}

async function submitReservation() {
  showTyping();
  try {
    await fetch(PROXY_URL + '/reserve', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: state.reserveName,
        phone: state.reservePhone,
        store: state.reserveStore,
        dogWeight: state.dogWeight,
      }),
    });
  } catch(e) { console.error('Reserve error:', e); }
  hideTyping();
  var firstName = state.reserveName.split(' ')[0];
  var msgEl = appendSage('Done, ' + firstName + '! A 1lb pack of ' + recipeLabel(state.recipe) + ' is set aside at ' + state.reserveStore + '.');
  addConfirmCard(msgEl);
}

async function askClaude(text, showNudge) {
  chatHistory.push({ role: 'user', content: text });
  showTyping();
  try {
    var res = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 300,
        system: buildSystemPrompt(),
        messages: chatHistory,
      }),
    });
    var rawText = await res.text();
    var data;
    try { data = JSON.parse(rawText); } catch(pe) {
      hideTyping();
      appendSage("Give us a call at 631-760-7850 and we'll help you out.");
      return;
    }
    if (data.error) {
      hideTyping();
      appendSage("Give us a call at 631-760-7850 and we'll help you out.");
      return;
    }
    var reply = (data.content || []).map(function(b){ return b.text || ''; }).join('');
    if (!reply) {
      hideTyping();
      appendSage("Give us a call at 631-760-7850 and we'll help you out.");
      return;
    }
    hideTyping();
    chatHistory.push({ role: 'assistant', content: reply });
    var msgEl = appendSage(reply);
    if (showNudge && state.stage === 'freeform') {
      addQuickReplies(msgEl, [
        { label: '✅ Reserve a pack', value: 'yes' },
        { label: '💬 Another question', value: 'more' },
      ], function(val) {
        if (val === 'yes') {
          state.stage = 'name';
          showTypingThen(400, function() { appendSage("Perfect. What's your name?"); });
        }
      });
    }
  } catch(e) {
    hideTyping();
    appendSage("Give us a call at 631-760-7850 and we'll help you out.");
  }
}

// UI HELPERS

function appendSage(text) {
  var container = document.getElementById('messages');
  var msg = document.createElement('div');
  msg.className = 'message sage';
  msg.innerHTML = '<div class="avatar sage-avatar">S</div><div class="bubble">' + formatText(text) + '</div>';
  container.appendChild(msg);
  scrollBottom();
  return msg;
}

function appendUser(text) {
  var container = document.getElementById('messages');
  var msg = document.createElement('div');
  msg.className = 'message user';
  msg.innerHTML = '<div class="avatar user-avatar">You</div><div class="bubble">' + formatText(text) + '</div>';
  container.appendChild(msg);
  scrollBottom();
}

function formatText(text) {
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function addWeightChips(msgEl) {
  var bubble = msgEl.querySelector('.bubble');
  var outer = document.createElement('div');
  outer.className = 'weight-chips-outer';
  var wrap = document.createElement('div');
  wrap.className = 'weight-chips-wrap';

  var weights = [];
  for (var w = 5; w <= 140; w += 10) weights.push(w);
  weights.push(150);

  weights.forEach(function(w) {
    var btn = document.createElement('button');
    btn.className = 'weight-chip';
    btn.textContent = w === 150 ? '150+ lbs' : w + ' lbs';
    (function(weight, button) {
      button.onclick = function() {
        wrap.querySelectorAll('.weight-chip').forEach(function(b) { b.disabled = true; b.classList.remove('selected'); });
        button.classList.add('selected');
        appendUser(button.textContent);
        setTimeout(function() { handleWeight(String(weight)); }, 200);
      };
    })(w, btn);
    wrap.appendChild(btn);
  });

  outer.appendChild(wrap);
  bubble.appendChild(outer);
  scrollBottom();
}

function addQuickReplies(msgEl, options, handler) {
  var bubble = msgEl.querySelector('.bubble');
  var wrap = document.createElement('div');
  wrap.className = 'quick-replies';
  options.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt.label;
    (function(o, button) {
      button.onclick = function() {
        wrap.querySelectorAll('.qr-btn').forEach(function(b) { b.classList.remove('selected'); b.disabled = true; });
        button.classList.add('selected');
        appendUser(o.label);
        setTimeout(function() { handler(o.value); }, 200);
      };
    })(opt, btn);
    wrap.appendChild(btn);
  });
  bubble.appendChild(wrap);
  scrollBottom();
}

function addStorePicker(msgEl) {
  var bubble = msgEl.querySelector('.bubble');
  var wrap = document.createElement('div');
  wrap.className = 'quick-replies';
  ['Babylon', 'Port Jefferson', 'Huntington'].forEach(function(store) {
    var btn = document.createElement('button');
    btn.className = 'qr-btn store-btn';
    btn.textContent = store;
    (function(s, button) {
      button.onclick = function() {
        wrap.querySelectorAll('.qr-btn').forEach(function(b) { b.disabled = true; b.classList.remove('selected'); });
        button.classList.add('selected');
        appendUser(s);
        setTimeout(function() { handleStore(s); }, 200);
      };
    })(store, btn);
    wrap.appendChild(btn);
  });
  bubble.appendChild(wrap);
  scrollBottom();
}

function addResultCard(msgEl, calc, recipe, customLabel) {
  var bubble = msgEl.querySelector('.bubble');
  var card = document.createElement('div');
  card.className = 'result-card';
  var mixCost = Math.round(calc.monthlyCost * 0.5);
  var isMix = recipe === 'multiple';
  var label = customLabel || recipeLabel(recipe);
  card.innerHTML =
    '<div class="result-row"><span class="label">Recipe</span><span class="value">' + label + '</span></div>' +
    '<div class="result-row"><span class="label">Daily amount</span><span class="value">' + calc.oz + ' oz/day</span></div>' +
    '<div class="result-row"><span class="label">Monthly need</span><span class="value">' + calc.monthlyLbs + ' lbs</span></div>' +
    '<div class="result-row highlight"><span class="label">Monthly cost</span><span class="value">~$' + calc.monthlyCost + '/mo</span></div>' +
    (isMix ? '' : '<div class="result-row mix-row"><span class="label">Mixing cost</span><span class="value">~$' + mixCost + '/mo</span></div>');
  bubble.appendChild(card);
  scrollBottom();
}

const INGREDIENTS = {
  beef:     'Ground Beef, Beef Heart, Sweet Potato, Beef Liver, Eggs, Kale, Spinach, Flaxseed Oil, Chia Seeds',
  original: 'Turkey, Sweet Potato, Turkey Liver, Turkey Heart, Pumpkin, Brown Rice, Green Beans, Carrots, Eggs, Coconut Oil',
  pork:     'Ground Pork, Sweet Potato, Pumpkin, Pork Liver, Broccoli, Kale, Eggs',
  lamb:     'Ground Lamb, Cauliflower, Carrots, Lamb Liver, Eggs, Blueberries, Spinach, Flaxseed Oil',
};

function addRecipeButtons(msgEl) {
  var bubble = msgEl.querySelector('.bubble');
  var wrap = document.createElement('div');
  wrap.className = 'recipe-buttons';

  var recipes = [
    { key: 'beef',     label: 'Beef' },
    { key: 'original', label: 'Original (Turkey)' },
    { key: 'pork',     label: 'Pork' },
    { key: 'lamb',     label: 'Lamb' },
    { key: 'multiple', label: '🔀 Mix / Not sure' },
  ];

  recipes.forEach(function(r) {
    var btn = document.createElement('button');
    btn.className = 'recipe-btn';
    var ing = INGREDIENTS[r.key] ? '<span class="recipe-ing">' + INGREDIENTS[r.key] + '</span>' : '';
    btn.innerHTML = '<span class="recipe-name">' + r.label + '</span>' + ing;
    (function(recipe, button) {
      button.onclick = function() {
        wrap.querySelectorAll('.recipe-btn').forEach(function(b) { b.disabled = true; b.classList.remove('selected'); });
        button.classList.add('selected');
        appendUser(recipe.label);
        setTimeout(function() { handleRecipe(recipe.key); }, 200);
      };
    })(r, btn);
    wrap.appendChild(btn);
  });

  bubble.appendChild(wrap);
  scrollBottom();
}

function addConfirmCard(msgEl) {
  var bubble = msgEl.querySelector('.bubble');
  var card = document.createElement('div');
  card.className = 'reserve-confirm';
  card.innerHTML = "We'll text you to confirm pickup at <strong>" + state.reserveStore + "</strong>. See you soon 👍";
  bubble.appendChild(card);
  scrollBottom();
}

function showTypingThen(delay, fn) {
  showTyping();
  setTimeout(function() { hideTyping(); fn(); }, delay);
}

function showTyping() {
  isTyping = true;
  var container = document.getElementById('messages');
  var t = document.createElement('div');
  t.className = 'typing';
  t.id = 'typingIndicator';
  t.innerHTML = '<div class="avatar sage-avatar">S</div><div class="typing-dots"><span></span><span></span><span></span></div>';
  container.appendChild(t);
  scrollBottom();
}

function hideTyping() {
  isTyping = false;
  var t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function scrollBottom() {
  var c = document.getElementById('messages');
  c.scrollTop = c.scrollHeight;
}

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', function() { setTimeout(scrollBottom, 50); });
  document.getElementById('userInput').addEventListener('focus', function() { setTimeout(scrollBottom, 300); });
}
</script>
