<!DOCTYPE html>
<html>
<head>
<title>NH BOM Bulk Import</title>
<style>
  body { font-family: monospace; background: #0f0e0c; color: #e8e4dc; padding: 40px; }
  button { background: #c8a96e; color: #0f0e0c; border: none; padding: 12px 24px; font-size: 14px; cursor: pointer; border-radius: 6px; font-weight: bold; }
  #log { margin-top: 20px; font-size: 12px; line-height: 1.8; color: #9a9690; max-height: 600px; overflow-y: auto; }
  .ok { color: #6db87a; }
  .err { color: #c96b5a; }
  .info { color: #c8a96e; }
</style>
</head>
<body>
<h2 style="color:#c8a96e;">Natural Hounds — Bulk BOM Import</h2>
<p style="color:#9a9690;margin-bottom:24px;">This will fetch your Shopify products, match them to BOMs, and push everything to KV via the Worker.</p>
<button onclick="runImport()">Run Import</button>
<div id="log"></div>

<script>
const PROXY = 'https://nh-inventory-proxy.rick-026.workers.dev';
const STORE = 'natural-hounds.myshopify.com';
const TOKEN = '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';

function log(msg, type = '') {
  const div = document.getElementById('log');
  div.innerHTML += `<div class="${type}">${msg}</div>`;
  div.scrollTop = div.scrollHeight;
}

async function apiGet(path) {
  const res = await fetch(`${PROXY}/shopify?path=${encodeURIComponent(path)}`, {
    headers: { 'X-Shopify-Store': STORE, 'X-Shopify-Token': TOKEN }
  });
  return res.json();
}

async function workerGet(path) {
  const res = await fetch(`${PROXY}${path}`, {
    headers: { 'X-Shopify-Store': STORE, 'X-Shopify-Token': TOKEN }
  });
  return res.json();
}

async function workerPost(path, body) {
  const res = await fetch(`${PROXY}${path}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Shopify-Store': STORE, 'X-Shopify-Token': TOKEN },
    body: JSON.stringify(body)
  });
  return res.json();
}

// ── ITEM NAME MAPPING ────────────────────────────────────────────────────────
// Maps logical names to exact inventory item names
const ITEM_MAP = {
  '1lb_tray': '1 Pound Trays',
  '2lb_tray': '2 Pound Trays',
  'original_label': 'Original Recipe Film',
  'beef_label': 'Beef Recipe Film',
  'pork_label': 'Pork Recipe Film',
  'lamb_label': 'Lamb Recipe Film',
  'small_box': 'Small Delivery Boxes',
  'large_box': 'Large Delivery Boxes',
};

// ── RECIPE DETECTION ─────────────────────────────────────────────────────────
function detectRecipes(variantTitle) {
  const t = variantTitle.toUpperCase();
  const recipes = [];
  if (t.includes('ORIGINAL')) recipes.push('original');
  if (t.includes('BEEF')) recipes.push('beef');
  if (t.includes('PORK')) recipes.push('pork');
  if (t.includes('LAMB')) recipes.push('lamb');
  if (t.includes('ALL')) return ['original', 'beef', 'pork', 'lamb'];
  return recipes;
}

// ── BOX SIZE DETECTION ───────────────────────────────────────────────────────
function detectSize(variantTitle) {
  if (variantTitle.includes('30lbs') || variantTitle.includes('30lb')) return 30;
  if (variantTitle.includes('20lbs') || variantTitle.includes('20lb')) return 20;
  if (variantTitle.includes('10lbs') || variantTitle.includes('10lb')) return 10;
  if (variantTitle.includes('5lbs') || variantTitle.includes('5lb')) return 5;
  return null;
}

// ── TRAY SPLITS ──────────────────────────────────────────────────────────────
// Returns {original, beef, pork, lamb} tray counts for a given size + recipe combo
function getTraysSplit(size, recipes) {
  const r = recipes; // array in priority order: original > beef > pork > lamb
  const n = r.length;

  // Total packs per size
  const packs = { 5: 5, 10: 5, 20: 10, 30: 15 };
  const total = packs[size];

  // Single recipe
  if (n === 1) {
    const result = { original: 0, beef: 0, pork: 0, lamb: 0 };
    result[r[0]] = total;
    return result;
  }

  // 2 recipes
  if (n === 2) {
    const splits = {
      5:  [3, 2],
      10: [3, 2],
      20: [5, 5],
      30: [8, 7],
    };
    const [a, b] = splits[size];
    const result = { original: 0, beef: 0, pork: 0, lamb: 0 };
    result[r[0]] = a;
    result[r[1]] = b;
    return result;
  }

  // 3 recipes
  if (n === 3) {
    const splits = {
      5:  [2, 2, 1],
      10: [2, 2, 1],
      20: [4, 3, 3],
      30: [5, 5, 5],
    };
    const [a, b, c] = splits[size];
    const result = { original: 0, beef: 0, pork: 0, lamb: 0 };
    result[r[0]] = a;
    result[r[1]] = b;
    result[r[2]] = c;
    return result;
  }

  // 4 recipes
  if (n === 4) {
    const splits = {
      5:  [2, 1, 1, 1],
      10: [2, 1, 1, 1],
      20: [3, 3, 2, 2],
      30: [4, 4, 4, 3],
    };
    const [a, b, c, d] = splits[size];
    const result = { original: 0, beef: 0, pork: 0, lamb: 0 };
    result[r[0]] = a;
    result[r[1]] = b;
    result[r[2]] = c;
    result[r[3]] = d;
    return result;
  }

  return { original: 0, beef: 0, pork: 0, lamb: 0 };
}

// ── BUILD COMPONENTS FOR A VARIANT ───────────────────────────────────────────
function buildComponents(size, recipes, itemsByName) {
  const trays = getTraysSplit(size, recipes);
  const components = [];
  const LABELS_PER_TRAY = 1.25;

  const trayKey = (size === 5) ? '1lb_tray' : '2lb_tray';
  const totalTrays = Object.values(trays).reduce((a, b) => a + b, 0);

  // Add trays
  const trayItem = itemsByName[ITEM_MAP[trayKey]];
  if (trayItem) {
    components.push({ itemId: trayItem.id, qty: totalTrays });
  }

  // Add labels per recipe
  const labelKeys = { original: 'original_label', beef: 'beef_label', pork: 'pork_label', lamb: 'lamb_label' };
  for (const recipe of recipes) {
    const count = trays[recipe];
    if (count > 0) {
      const labelItem = itemsByName[ITEM_MAP[labelKeys[recipe]]];
      if (labelItem) {
        components.push({ itemId: labelItem.id, qty: parseFloat((count * LABELS_PER_TRAY).toFixed(4)) });
      }
    }
  }

  // Add box
  const boxKey = (size >= 20) ? 'large_box' : 'small_box';
  const boxItem = itemsByName[ITEM_MAP[boxKey]];
  if (boxItem) {
    components.push({ itemId: boxItem.id, qty: 1 });
  }

  return components;
}

// ── MAIN IMPORT ──────────────────────────────────────────────────────────────
async function runImport() {
  document.querySelector('button').disabled = true;
  document.getElementById('log').innerHTML = '';

  try {
    // Load existing items from KV
    log('Loading inventory items from KV...', 'info');
    const items = await workerGet('/api/items');
    const itemsByName = {};
    items.forEach(i => { itemsByName[i.name] = i; });
    log(`Found ${items.length} inventory items`, 'ok');

    // Verify required items exist
    const required = Object.values(ITEM_MAP);
    const missing = required.filter(name => !itemsByName[name]);
    if (missing.length > 0) {
      log(`⚠ Missing inventory items: ${missing.join(', ')}`, 'err');
      log('Please add these items in the Inventory Items page first.', 'err');
      document.querySelector('button').disabled = false;
      return;
    }
    log('All required inventory items found ✓', 'ok');

    // Load existing BOMs
    log('Loading existing BOMs...', 'info');
    const existingBoms = await workerGet('/api/boms');
    const existingByKey = {};
    existingBoms.forEach(b => { existingByKey[b.productKey] = b; });
    log(`Found ${existingBoms.length} existing BOMs`, 'ok');

    // Load Shopify products
    log('Loading Shopify products...', 'info');
    let allProducts = [];
    const data = await apiGet('products.json?limit=250&fields=id,title,variants');
    allProducts = data.products || [];
    log(`Found ${allProducts.length} Shopify products`, 'ok');

    // Build new BOMs
    const newBoms = [...existingBoms]; // start with existing
    let added = 0;
    let skipped = 0;
    let unmatched = 0;

    for (const product of allProducts) {
      const title = product.title;

      // Only process Variety Box products
      if (!title.includes('Variety Box')) {
        continue;
      }

      for (const variant of (product.variants || [])) {
        const variantTitle = variant.title === 'Default Title' ? title : `${title} — ${variant.title}`;
        const productKey = `${product.id}_${variant.id}`;

        // Parse size and recipes from the full variant name
        const fullName = variantTitle;
        const size = detectSize(fullName);
        const recipes = detectRecipes(fullName);

        if (!size || recipes.length === 0) {
          log(`⚠ Could not parse: ${variantTitle}`, 'err');
          unmatched++;
          continue;
        }

        // Skip if BOM already exists
        if (existingByKey[productKey]) {
          log(`Skip (exists): ${variantTitle}`, '');
          skipped++;
          continue;
        }

        // Build components
        const components = buildComponents(size, recipes, itemsByName);
        if (components.length === 0) {
          log(`⚠ No components built for: ${variantTitle}`, 'err');
          unmatched++;
          continue;
        }

        const bom = {
          id: Date.now().toString() + Math.random().toString(36).slice(2),
          productKey,
          productTitle: variantTitle,
          components,
          notes: `Auto-generated: ${size}lb box, ${recipes.join('+')}`,
          updatedAt: new Date().toISOString()
        };

        newBoms.push(bom);
        existingByKey[productKey] = bom; // prevent duplicates within same run

        const componentDesc = components.map(c => {
          const item = items.find(i => i.id === c.itemId);
          return `${c.qty} ${item?.unit || ''} ${item?.name || c.itemId}`;
        }).join(', ');

        log(`✓ ${variantTitle} → ${componentDesc}`, 'ok');
        added++;

        // Small delay to avoid overwhelming
        await new Promise(r => setTimeout(r, 10));
      }
    }

    // Push all BOMs to KV
    log(`\nPushing ${newBoms.length} BOMs to KV...`, 'info');
    await workerPost('/api/boms', newBoms);
    log(`✅ Done! Added ${added} new BOMs, skipped ${skipped} existing, ${unmatched} unmatched.`, 'ok');

  } catch(e) {
    log(`Error: ${e.message}`, 'err');
    console.error(e);
  }

  document.querySelector('button').disabled = false;
}
</script>
</body>
</html>
