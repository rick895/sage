<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Natural Hounds — Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #242220;
    --border: #2e2c28;
    --border2: #3d3a35;
    --text: #e8e4dc;
    --text2: #9a9690;
    --text3: #5c5a56;
    --accent: #c8a96e;
    --accent2: #8b6c3a;
    --green: #6db87a;
    --yellow: #d4a843;
    --red: #c96b5a;
    --mono: 'DM Mono', monospace;
    --serif: 'Fraunces', serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; min-height: 100vh; line-height: 1.5; }
  .shell { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; min-width: 220px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
  .sidebar-logo { padding: 24px 20px 20px; border-bottom: 1px solid var(--border); }
  .sidebar-logo .wordmark { font-family: var(--serif); font-size: 18px; font-weight: 600; color: var(--accent); letter-spacing: -0.3px; line-height: 1.1; }
  .sidebar-logo .sub { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 3px; }
  nav { padding: 12px 0; flex: 1; }
  .nav-section { padding: 8px 20px 4px; font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: var(--text3); }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 20px; cursor: pointer; color: var(--text2); transition: all 0.15s; border-left: 2px solid transparent; font-size: 12px; }
  .nav-item:hover { color: var(--text); background: var(--surface2); }
  .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(200,169,110,0.06); }
  .nav-item svg { width: 14px; height: 14px; opacity: 0.7; flex-shrink: 0; }
  .nav-item.active svg { opacity: 1; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .topbar-title { font-family: var(--serif); font-size: 20px; font-weight: 300; color: var(--text); letter-spacing: -0.3px; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .store-badge { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; font-size: 11px; color: var(--text2); }
  .store-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .content { flex: 1; padding: 28px; overflow-y: auto; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text2); }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text3); margin-bottom: 8px; }
  .stat-value { font-family: var(--serif); font-size: 28px; font-weight: 300; color: var(--text); line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .stat-card.warn .stat-value { color: var(--yellow); }
  .stat-card.danger .stat-value { color: var(--red); }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th { padding: 10px 16px; text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text3); border-bottom: 1px solid var(--border); white-space: nowrap; background: var(--surface); position: sticky; top: 0; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 12px 16px; vertical-align: middle; }
  .item-name { font-weight: 500; color: var(--text); }
  .item-sku { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .badge-green { background: rgba(109,184,122,0.12); color: var(--green); border: 1px solid rgba(109,184,122,0.2); }
  .badge-yellow { background: rgba(212,168,67,0.12); color: var(--yellow); border: 1px solid rgba(212,168,67,0.2); }
  .badge-red { background: rgba(201,107,90,0.12); color: var(--red); border: 1px solid rgba(201,107,90,0.2); }
  .badge-gray { background: rgba(154,150,144,0.1); color: var(--text2); border: 1px solid var(--border); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 6px; font-family: var(--mono); font-size: 12px; cursor: pointer; border: none; transition: all 0.15s; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #0f0e0c; font-weight: 500; }
  .btn-primary:hover { background: #d4b87a; }
  .btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
  .btn-ghost:hover { border-color: var(--text2); color: var(--text); }
  .btn-danger { background: transparent; border: 1px solid rgba(201,107,90,0.3); color: var(--red); }
  .btn-danger:hover { background: rgba(201,107,90,0.1); }
  .btn-sm { padding: 5px 10px; font-size: 11px; }
  input, select, textarea { background: var(--bg); border: 1px solid var(--border2); border-radius: 6px; color: var(--text); font-family: var(--mono); font-size: 12px; padding: 8px 12px; width: 100%; outline: none; transition: border-color 0.15s; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 5px; }
  .form-group { margin-bottom: 14px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal-title { font-family: var(--serif); font-size: 17px; font-weight: 300; }
  .modal-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 20px; line-height: 1; padding: 4px; transition: color 0.15s; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px 24px; }
  .modal-footer { padding: 14px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }
  .setup-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); padding: 40px 20px; }
  .setup-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 480px; }
  .setup-logo { font-family: var(--serif); font-size: 26px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
  .setup-sub { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 32px; }
  .setup-field { margin-bottom: 18px; }
  .setup-note { background: rgba(200,169,110,0.08); border: 1px solid rgba(200,169,110,0.2); border-radius: 8px; padding: 12px 16px; font-size: 11px; color: var(--text2); margin-bottom: 24px; line-height: 1.6; }
  .stock-bar-wrap { display: flex; align-items: center; gap: 10px; min-width: 120px; }
  .stock-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .stock-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
  .stock-qty { font-size: 13px; font-weight: 500; min-width: 32px; text-align: right; }
  .bom-row { display: grid; grid-template-columns: 1fr 80px 80px auto; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .bom-row:last-child { border-bottom: none; }
  .bom-row-header { color: var(--text3); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .log-entry { display: flex; align-items: flex-start; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .log-entry:last-child { border-bottom: none; }
  .log-time { color: var(--text3); white-space: nowrap; font-size: 11px; min-width: 140px; }
  .log-icon { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; margin-top: 1px; }
  .log-icon.in { background: rgba(109,184,122,0.15); color: var(--green); }
  .log-icon.out { background: rgba(201,107,90,0.15); color: var(--red); }
  .log-icon.adj { background: rgba(212,168,67,0.15); color: var(--yellow); }
  .empty { text-align: center; padding: 48px 20px; color: var(--text3); }
  .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 13px; }
  .alert-strip { display: flex; align-items: center; gap: 10px; background: rgba(201,107,90,0.08); border: 1px solid rgba(201,107,90,0.2); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 12px; color: var(--red); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 200; }
  .toast { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 12px 16px; font-size: 12px; display: flex; align-items: center; gap: 8px; animation: toastIn 0.2s ease; min-width: 240px; }
  @keyframes toastIn { from { transform: translateX(16px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error { border-left: 3px solid var(--red); }
  .toast.info { border-left: 3px solid var(--accent); }
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  .text-muted { color: var(--text3); }
  .text-accent { color: var(--accent); }
  .flex { display: flex; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .gap-8 { gap: 8px; }
  .mb-16 { margin-bottom: 16px; }
  .mb-24 { margin-bottom: 24px; }
  .w-full { width: 100%; }
  .number-input-row { display: flex; align-items: center; gap: 0; }
  .number-input-row input { border-radius: 0; text-align: center; width: 60px; }
